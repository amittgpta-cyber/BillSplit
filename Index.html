<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillSplit Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZSn7iFuycHYDAP7nIsoFmJGLOx-s1heyongu91Oadzi-MeryD1AKLZHKLcpixz7tebg/exec';

        // Pre-defined Rules
        const RULES = {
            cards: {
                'HDFC Swiggy': 'Alka',
                'Axis Airtel': 'Amit'
            },
            categories: {
                'Subscriptions': 'Amit',
                'Cook Salary': 'Amit',
                'Cleaner Salary': 'Amit',
                'Car Wash': 'Amit',
                'Electricity Bill': 'Amit',
                'Broadband Bill': 'Amit',
                'Nanny Salary': 'Split',
                'Monthly Rent': 'Split',
                'Society Maintenance': 'Split',
                'Home Loan EMI': 'Split',
                'TDS on Loan': 'Split'
            }
        };

        const CATEGORIES = ['Food Delivery', 'Dining', 'Groceries', 'Utilities', 'Shopping', 'Travel', 'Subscriptions', 'Cook Salary', 'Cleaner Salary', 'Car Wash', 'Electricity Bill', 'Broadband Bill', 'Nanny Salary', 'Monthly Rent', 'Society Maintenance', 'Home Loan EMI', 'TDS on Loan', 'Adhoc'];
        const CARDS = ['HDFC Regalia Gold', 'HDFC Swiggy', 'ICICI Sapphiro', 'ICICI Coral RuPay', 'SBI SimplyCLICK', 'Tata Neu Infinity', 'Bank of Baroda Eterna', 'Scapia', 'Amazon Pay ICICI', 'Axis Airtel', 'IndusInd EazyDiner', 'Amex Platinum Travel', 'Cash/UPI'];

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [transactions, setTransactions] = useState([]);
            const [isSyncing, setIsSyncing] = useState(false);

            // Manual Entry State
            const [manualEntry, setManualEntry] = useState({
                date: new Date().toISOString().split('T')[0],
                description: '',
                amount: '',
                category: CATEGORIES[0],
                card: 'Cash/UPI'
            });

            const determineOwner = (card, category) => {
                if (RULES.cards[card]) return RULES.cards[card];
                if (RULES.categories[category]) return RULES.categories[category];
                return 'Split';
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        // Very basic mapping, assumes standard CSV headers. 
                        // You may need to tweak field names based on specific bank formats.
                        const parsedTxns = results.data.map(row => {
                            const date = row['Date'] || row['Transaction Date'] || new Date().toISOString().split('T')[0];
                            const desc = row['Description'] || row['Narration'] || row['Details'] || 'Unknown';
                            const amt = parseFloat(row['Amount'] || row['Debit'] || row['Value'] || 0);
                            const defaultCard = 'HDFC Regalia Gold'; // Placeholder if unknown
                            
                            if (amt > 0) {
                                return {
                                    id: crypto.randomUUID(),
                                    date: date,
                                    description: desc,
                                    amount: amt,
                                    category: 'Uncategorized',
                                    card: defaultCard,
                                    type: 'Credit Card',
                                    owner: 'Split',
                                    source: file.name
                                };
                            }
                            return null;
                        }).filter(t => t !== null);

                        setTransactions([...transactions, ...parsedTxns]);
                        setView('transactions');
                    }
                });
            };

            const addManualEntry = (e) => {
                e.preventDefault();
                if (!manualEntry.amount || !manualEntry.description) return;
                
                const owner = determineOwner(manualEntry.card, manualEntry.category);
                
                const newTxn = {
                    id: crypto.randomUUID(),
                    date: manualEntry.date,
                    description: manualEntry.description,
                    amount: parseFloat(manualEntry.amount),
                    category: manualEntry.category,
                    card: manualEntry.card,
                    type: manualEntry.card === 'Cash/UPI' ? 'Adhoc' : 'Credit Card',
                    owner: owner,
                    source: 'Manual'
                };

                setTransactions([newTxn, ...transactions]);
                setManualEntry({ ...manualEntry, description: '', amount: '' });
                setView('transactions');
            };

            const updateTransaction = (id, field, value) => {
                setTransactions(transactions.map(t => {
                    if (t.id === id) {
                        const updated = { ...t, [field]: value };
                        if (field === 'category' || field === 'card') {
                            updated.owner = determineOwner(updated.card, updated.category);
                        }
                        return updated;
                    }
                    return t;
                }));
            };

            const removeTransaction = (id) => {
                setTransactions(transactions.filter(t => t.id !== id));
            };

            const syncToSheets = async () => {
                if (transactions.length === 0) return alert('No transactions to sync');
                setIsSyncing(true);
                
                const payload = {
                    action: 'appendTransactions',
                    transactions: transactions.map(t => ({
                        recordId: t.id,
                        date: t.date,
                        month: t.date.substring(0, 7),
                        cardName: t.card,
                        description: t.description,
                        amount: t.amount,
                        category: t.category,
                        transactionType: t.type,
                        autoAssignedOwner: t.owner,
                        finalOwner: t.owner,
                        sourceFile: t.source,
                        statementMonth: t.date.substring(0, 7)
                    }))
                };

                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        mode: 'no-cors'
                    });
                    alert('Successfully synced to Google Sheets!');
                    setTransactions([]); 
                    setView('dashboard');
                } catch (error) {
                    alert('Error syncing. Check console.');
                    console.error(error);
                } finally {
                    setIsSyncing(false);
                }
            };

            // Calculations
            const stats = useMemo(() => {
                let total = 0, amitTotal = 0, alkaTotal = 0;
                
                transactions.forEach(t => {
                    total += t.amount;
                    if (t.owner === 'Amit') amitTotal += t.amount;
                    else if (t.owner === 'Alka') alkaTotal += t.amount;
                    else {
                        amitTotal += t.amount / 2;
                        alkaTotal += t.amount / 2;
                    }
                });

                let settlementText = 'Settled';
                if (amitTotal > alkaTotal) settlementText = `Alka owes Amit ₹${(amitTotal - alkaTotal).toFixed(2)}`;
                if (alkaTotal > amitTotal) settlementText = `Amit owes Alka ₹${(alkaTotal - amitTotal).toFixed(2)}`;

                return { total, amitTotal, alkaTotal, settlementText };
            }, [transactions]);

            const shareWhatsApp = () => {
                const text = `*BillSplit Pro Summary*\n\n` +
                             `*Total Spend:* ₹${stats.total.toFixed(2)}\n` +
                             `*Amit's Share:* ₹${stats.amitTotal.toFixed(2)}\n` +
                             `*Alka's Share:* ₹${stats.alkaTotal.toFixed(2)}\n\n` +
                             `*Settlement:* ${stats.settlementText}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-20 relative">
                    {/* Header */}
                    <header className="bg-teal-700 text-white p-4 sticky top-0 z-10 shadow-md flex justify-between items-center">
                        <h1 className="text-xl font-bold"><i className="fa-solid fa-file-invoice-dollar mr-2"></i>BillSplit Pro</h1>
                        {transactions.length > 0 && (
                            <button onClick={syncToSheets} disabled={isSyncing} className="bg-teal-600 px-3 py-1 rounded text-sm hover:bg-teal-500">
                                {isSyncing ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-cloud-arrow-up"></i>} Sync
                            </button>
                        )}
                    </header>

                    {/* Main Content Area */}
                    <main className="p-4">
                        {/* DASHBOARD VIEW */}
                        {view === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="bg-gray-50 rounded-xl p-5 border border-gray-100 shadow-sm text-center">
                                    <p className="text-gray-500 text-sm mb-1">Total Unsynced Spend</p>
                                    <h2 className="text-3xl font-bold text-gray-800">₹{stats.total.toFixed(2)}</h2>
                                    <p className="text-teal-600 font-semibold mt-2 bg-teal-50 inline-block px-3 py-1 rounded-full">{stats.settlementText}</p>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 text-center">
                                        <p className="text-blue-600 text-sm font-semibold mb-1">Amit's Share</p>
                                        <p className="text-xl font-bold text-blue-900">₹{stats.amitTotal.toFixed(2)}</p>
                                    </div>
                                    <div className="bg-purple-50 p-4 rounded-xl border border-purple-100 text-center">
                                        <p className="text-purple-600 text-sm font-semibold mb-1">Alka's Share</p>
                                        <p className="text-xl font-bold text-purple-900">₹{stats.alkaTotal.toFixed(2)}</p>
                                    </div>
                                </div>

                                <button onClick={shareWhatsApp} className="w-full bg-green-500 text-white p-3 rounded-lg font-semibold flex justify-center items-center gap-2 hover:bg-green-600 shadow-md">
                                    <i className="fa-brands fa-whatsapp text-xl"></i> Share Summary
                                </button>
                            </div>
                        )}

                        {/* IMPORT / ADD VIEW */}
                        {view === 'add' && (
                            <div className="space-y-6">
                                <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                    <h3 className="font-bold text-gray-700 mb-4 border-b pb-2"><i className="fa-solid fa-file-csv mr-2"></i>Import CSV</h3>
                                    <input type="file" accept=".csv" onChange={handleFileUpload} className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-teal-50 file:text-teal-700 hover:file:bg-teal-100" />
                                </div>

                                <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                    <h3 className="font-bold text-gray-700 mb-4 border-b pb-2"><i className="fa-solid fa-pen-to-square mr-2"></i>Manual Entry</h3>
                                    <form onSubmit={addManualEntry} className="space-y-3">
                                        <input type="date" value={manualEntry.date} onChange={e => setManualEntry({...manualEntry, date: e.target.value})} className="w-full border p-2 rounded focus:outline-none focus:border-teal-500" required />
                                        <input type="text" placeholder="Description (e.g. Maid Salary)" value={manualEntry.description} onChange={e => setManualEntry({...manualEntry, description: e.target.value})} className="w-full border p-2 rounded focus:outline-none focus:border-teal-500" required />
                                        <input type="number" placeholder="Amount (₹)" value={manualEntry.amount} onChange={e => setManualEntry({...manualEntry, amount: e.target.value})} className="w-full border p-2 rounded focus:outline-none focus:border-teal-500" required />
                                        
                                        <select value={manualEntry.category} onChange={e => setManualEntry({...manualEntry, category: e.target.value})} className="w-full border p-2 rounded bg-white">
                                            {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        
                                        <select value={manualEntry.card} onChange={e => setManualEntry({...manualEntry, card: e.target.value})} className="w-full border p-2 rounded bg-white">
                                            {CARDS.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        
                                        <button type="submit" className="w-full bg-teal-700 text-white p-2 rounded font-semibold hover:bg-teal-800">Add Entry</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* TRANSACTIONS VIEW */}
                        {view === 'transactions' && (
                            <div className="space-y-4">
                                {transactions.length === 0 ? (
                                    <p className="text-center text-gray-500 mt-10">No transactions added yet.</p>
                                ) : (
                                    transactions.sort((a, b) => b.amount - a.amount).map(txn => (
                                        <div key={txn.id} className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm relative">
                                            <button onClick={() => removeTransaction(txn.id)} className="absolute top-2 right-2 text-red-400 hover:text-red-600"><i className="fa-solid fa-xmark"></i></button>
                                            
                                            <div className="flex justify-between items-start mb-2 pr-4">
                                                <div>
                                                    <p className="font-bold text-gray-800">{txn.description}</p>
                                                    <p className="text-xs text-gray-500">{txn.date} • {txn.source === 'Manual' ? 'Manual' : 'CSV'}</p>
                                                </div>
                                                <p className="font-bold text-lg text-teal-700">₹{txn.amount}</p>
                                            </div>

                                            <div className="grid grid-cols-3 gap-2 mt-3">
                                                <select value={txn.category} onChange={(e) => updateTransaction(txn.id, 'category', e.target.value)} className="text-xs border p-1 rounded bg-gray-50 text-gray-700 col-span-1">
                                                    <option value="Uncategorized">Select Cat...</option>
                                                    {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>

                                                <select value={txn.card} onChange={(e) => updateTransaction(txn.id, 'card', e.target.value)} className="text-xs border p-1 rounded bg-gray-50 text-gray-700 col-span-1">
                                                    {CARDS.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>

                                                <select value={txn.owner} onChange={(e) => updateTransaction(txn.id, 'owner', e.target.value)} className={`text-xs border p-1 rounded font-semibold col-span-1 ${txn.owner === 'Amit' ? 'bg-blue-100 text-blue-800' : txn.owner === 'Alka' ? 'bg-purple-100 text-purple-800' : 'bg-green-100 text-green-800'}`}>
                                                    <option value="Split">Split 50/50</option>
                                                    <option value="Amit">100% Amit</option>
                                                    <option value="Alka">100% Alka</option>
                                                </select>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 w-full max-w-md bg-white border-t flex justify-around p-3 pb-safe z-20">
                        <button onClick={() => setView('dashboard')} className={`flex flex-col items-center flex-1 ${view === 'dashboard' ? 'text-teal-700' : 'text-gray-400'}`}>
                            <i className="fa-solid fa-chart-pie text-xl mb-1"></i>
                            <span className="text-[10px] font-semibold">Dashboard</span>
                        </button>
                        <button onClick={() => setView('add')} className={`flex flex-col items-center flex-1 ${view === 'add' ? 'text-teal-700' : 'text-gray-400'}`}>
                            <div className="bg-teal-700 text-white rounded-full w-10 h-10 flex items-center justify-center -mt-5 border-4 border-white shadow-sm">
                                <i className="fa-solid fa-plus text-lg"></i>
                            </div>
                            <span className="text-[10px] font-semibold mt-1">Add</span>
                        </button>
                        <button onClick={() => setView('transactions')} className={`flex flex-col items-center flex-1 relative ${view === 'transactions' ? 'text-teal-700' : 'text-gray-400'}`}>
                            {transactions.length > 0 && <span className="absolute top-0 right-4 bg-red-500 text-white text-[8px] rounded-full w-4 h-4 flex items-center justify-center font-bold">{transactions.length}</span>}
                            <i className="fa-solid fa-list-ul text-xl mb-1"></i>
                            <span className="text-[10px] font-semibold">List</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
