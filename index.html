<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillSplit Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(10%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* AMOLED Black Theme Overrides */
        body, .bg-gray-50, .bg-gray-100, .bg-white { background-color: #000000 !important; }
        .text-gray-800, .text-gray-700, .text-gray-600 { color: #e5e7eb !important; }
        .text-gray-500, .text-gray-400 { color: #9ca3af !important; }
        .border, .border-gray-200, .border-gray-100, .border-b, .border-t { border-color: #1f2937 !important; }
        input, select { background-color: #111111 !important; color: #ffffff !important; border-color: #333333 !important; color-scheme: dark; }
        
        .bg-teal-50 { background-color: #022c22 !important; border-color: #115e59 !important; }
        .text-teal-800 { color: #5eead4 !important; }
        .bg-blue-50 { background-color: #082f49 !important; border-color: #1e3a8a !important; }
        .text-blue-800, .text-blue-700 { color: #93c5fd !important; }
        .bg-purple-50 { background-color: #3b0764 !important; border-color: #5b21b6 !important; }
        .text-purple-800, .text-purple-700 { color: #d8b4fe !important; }
        .bg-amber-300 { background-color: #78350f !important; color: #fde68a !important; }
        .bg-amber-300.text-amber-900 { color: #fde68a !important; }
        
        nav, .absolute.bottom-16.right-0.bg-white { background-color: #000000 !important; border-color: #1f2937 !important; }
        
        .recharts-cartesian-grid-horizontal line { stroke: #1f2937 !important; }
        .recharts-text { fill: #9ca3af !important; }
        .recharts-default-tooltip { background-color: #111111 !important; border-color: #333333 !important; }
        .recharts-tooltip-item { color: #ffffff !important; }
    </style>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW fail', err));
        });
      }
    </script>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts;

        const DEFAULT_OFFLINE_SPENDS = ['Home Loan EMI', 'Monthly Rent', 'Society Maintenance', 'Cook Salary', 'Cleaning Maid Salary', 'Nanny Salary', 'Grocery', 'Car Wash', 'Electricity Bill', 'Broadband Bill'];
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

        const App = () => {
            const [view, setView] = useState('dashboard'); 
            const [isSyncing, setIsSyncing] = useState(false);
            const [isLoadingInitial, setIsLoadingInitial] = useState(false);
            const [fetchedSummary, setFetchedSummary] = useState([]);
            const [fetchedCards, setFetchedCards] = useState([]);
            const [shareModalOpen, setShareModalOpen] = useState(false);
            const [expandedUser, setExpandedUser] = useState(null);

            const [chartOrder, setChartOrder] = useState(() => {
                try { const saved = localStorage.getItem('bs_chart_order'); return saved ? JSON.parse(saved) : ['trend', 'pie', 'bar']; } 
                catch { return ['trend', 'pie', 'bar']; }
            });
            const [minimizedCharts, setMinimizedCharts] = useState(() => {
                try { const saved = localStorage.getItem('bs_minimized_charts'); return saved ? JSON.parse(saved) : {}; } 
                catch { return {}; }
            });

            const [scriptUrl, setScriptUrl] = useState(() => localStorage.getItem('bs_script_url') || '');
            const [user1Name, setUser1Name] = useState(() => localStorage.getItem('bs_user1_name') || 'Amit');
            const [user2Name, setUser2Name] = useState(() => localStorage.getItem('bs_user2_name') || 'Alka');
            
            const getCurrentMonth = () => {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            };
            const [selectedMonth, setSelectedMonth] = useState(getCurrentMonth());

            const [cardList, setCardList] = useState([]);
            const [newCardName, setNewCardName] = useState('');
            const [isAddingCard, setIsAddingCard] = useState(false);
            
            const [formData, setFormData] = useState({});
            const initOfflineSpends = () => DEFAULT_OFFLINE_SPENDS.map(desc => ({ id: generateId(), desc, amount: '', owner: 'Auto', isCustom: false }));
            const [offlineSpends, setOfflineSpends] = useState(initOfflineSpends());
            const [loans, setLoans] = useState([]);

            const [showHistory, setShowHistory] = useState(false);
            const [historyMonth, setHistoryMonth] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [timeframe, setTimeframe] = useState('Rolling 12');

            const rules = useMemo(() => ({
                cards: { 'HDFC Swiggy': user2Name, 'Axis Airtel': user1Name },
                categories: {
                    'Cook Salary': user1Name, 'Cleaning Maid Salary': user1Name, 'Nanny Salary': user1Name, 'Car Wash': user1Name,
                    'Electricity Bill': user1Name, 'Broadband Bill': user1Name, 'Monthly Rent': 'Split',
                    'Society Maintenance': 'Split', 'Home Loan EMI': 'Split', 'Grocery': 'Split'
                }
            }), [user1Name, user2Name]);

            const toYYYYMM = (dateVal) => {
                if (!dateVal) return '';
                const s = String(dateVal);
                if (s.includes('T')) {
                    const d = new Date(s);
                    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                }
                const parts = s.split('-');
                if (parts.length >= 2) return `${parts[0]}-${parts[1].padStart(2, '0')}`;
                return s.substring(0, 7); 
            };

            useEffect(() => { localStorage.setItem('bs_chart_order', JSON.stringify(chartOrder)); }, [chartOrder]);
            useEffect(() => { localStorage.setItem('bs_minimized_charts', JSON.stringify(minimizedCharts)); }, [minimizedCharts]);

            useEffect(() => {
                if (scriptUrl) fetchAllData();
            }, [scriptUrl]);

            useEffect(() => {
                if (fetchedSummary && fetchedSummary.length > 0 && !historyMonth) {
                    const lastRow = fetchedSummary[fetchedSummary.length - 1];
                    if (lastRow && lastRow[0]) setHistoryMonth(toYYYYMM(lastRow[0]));
                }
            }, [fetchedSummary]);

            const sortedCardList = useMemo(() => {
                if (!cardList.length) return [];
                if (!fetchedCards.length) return cardList;

                const sortedMonths = [...new Set(fetchedCards.filter(c => c && c[0]).map(c => toYYYYMM(c[0])))].sort().slice(-6);
                const recentCards = fetchedCards.filter(c => c && c[0] && sortedMonths.includes(toYYYYMM(c[0])));

                const counts = {};
                cardList.forEach(c => counts[c] = 0);

                recentCards.forEach(c => {
                    if (c[1] && counts[c[1]] !== undefined && parseFloat(c[2]) > 0) counts[c[1]]++;
                });

                return [...cardList].sort((a, b) => counts[b] - counts[a]);
            }, [cardList, fetchedCards]);

            useEffect(() => {
                setFormData(prev => {
                    const updated = { ...prev };
                    sortedCardList.forEach(c => {
                        if (!updated[c]) updated[c] = { total: '', overrides: [] };
                    });
                    return updated;
                });
            }, [sortedCardList]);

            const fetchAllData = async () => {
                if (!scriptUrl.trim()) return;
                setIsLoadingInitial(true);
                try {
                    const response = await fetch(`${scriptUrl.trim()}?action=getAllData`);
                    const result = await response.json();
                    
                    if (result.ok && result.data) {
                        setFetchedSummary(result.data.summary || []);
                        setFetchedCards(result.data.cards || []);
                        if (result.data.myCards && result.data.myCards.length > 0) setCardList(result.data.myCards);
                    }
                } catch (error) {
                    alert("Could not load data. Ensure your URL is correct and deployed securely.");
                } finally {
                    setIsLoadingInitial(false);
                }
            };

            const handleAddCard = async () => {
                if (!newCardName.trim() || !scriptUrl) return;
                setIsAddingCard(true);
                try {
                    await fetch(scriptUrl.trim(), {
                        method: 'POST',
                        body: JSON.stringify({ action: 'addCard', cardName: newCardName.trim() }),
                        mode: 'no-cors'
                    });
                    
                    setCardList(prev => [...prev, newCardName.trim()]);
                    setNewCardName('');
                    alert('Card added! Syncing list...');
                    setTimeout(fetchAllData, 1000); 
                } catch (e) {
                    alert('Failed to add card to sheet.');
                } finally {
                    setIsAddingCard(false);
                }
            };

            const handleTotalChange = (card, value) => setFormData(prev => ({ ...prev, [card]: { ...prev[card], total: value } }));
            const addOverride = (card) => setFormData(prev => ({ ...prev, [card]: { ...prev[card], overrides: [...prev[card].overrides, { id: generateId(), desc: '', amount: '', owner: user1Name }] } }));
            const updateOverride = (card, id, field, value) => setFormData(prev => ({ ...prev, [card]: { ...prev[card], overrides: prev[card].overrides.map(ov => ov.id === id ? { ...ov, [field]: value } : ov) } }));
            const removeOverride = (card, id) => setFormData(prev => ({ ...prev, [card]: { ...prev[card], overrides: prev[card].overrides.filter(ov => ov.id !== id) } }));
            const handleOfflineChange = (id, field, value) => setOfflineSpends(prev => prev.map(exp => exp.id === id ? { ...exp, [field]: value } : exp));
            const addCustomOfflineSpend = () => setOfflineSpends(prev => [...prev, { id: generateId(), desc: '', amount: '', owner: 'Split', isCustom: true }]);
            const removeOfflineSpend = (id) => setOfflineSpends(prev => prev.filter(exp => exp.id !== id));
            const handleLoanChange = (id, field, value) => setLoans(prev => prev.map(loan => loan.id === id ? { ...loan, [field]: value } : loan));
            const addLoan = () => setLoans(prev => [...prev, { id: generateId(), desc: '', amount: '', borrower: user1Name }]);
            const removeLoan = (id) => setLoans(prev => prev.filter(loan => loan.id !== id));

            const resetForm = () => {
                if (window.confirm("Are you sure you want to clear all entered data?")) {
                    const reset = {};
                    sortedCardList.forEach(c => reset[c] = { total: '', overrides: [] });
                    setFormData(reset);
                    setOfflineSpends(initOfflineSpends());
                    setLoans([]);
                }
            };

            const submitForCalculation = () => {
                setView('dashboard');
                window.scrollTo(0, 0);
            };

            const formatMoney = (amount) => {
                const num = parseFloat(amount);
                if (isNaN(num)) return '---';
                const hasDecimal = num % 1 !== 0;
                return `₹ ${num.toLocaleString('en-IN', { minimumFractionDigits: hasDecimal ? 2 : 0, maximumFractionDigits: hasDecimal ? 2 : 0 })}`;
            };

            const formatMonthName = (dateStr) => {
                if (!dateStr) return '';
                try {
                    const clean = toYYYYMM(dateStr);
                    const parts = clean.split('-');
                    if (parts.length >= 2) {
                        const date = new Date(parts[0], parts[1] - 1);
                        return `${date.toLocaleDateString('en-US', { month: 'short' })}'${parts[0].slice(-2)}`;
                    }
                    return dateStr;
                } catch (e) {
                    return dateStr;
                }
            };

            const formatOverrideString = (ovStr) => {
                if (!ovStr) return '';
                const match = ovStr.match(/(.*)\s-\s₹([\d.]+)\s\((.*)\)/);
                if (match) return `${match[1].trim()} - ${formatMoney(match[2])} (${match[3].trim()})`;
                return ovStr;
            };

            const parseDeductionsLog = (logStr) => {
                if (!logStr || String(logStr) === 'None') return [];
                return String(logStr).split(' | ').map(item => {
                    const match = item.match(/(.*)\s-\s₹([\d.]+)\s\((.*)\)/);
                    if (match) return { desc: match[1].trim(), amount: parseFloat(match[2]), owner: match[3].trim() };
                    return null;
                }).filter(Boolean);
            };

            const moveChart = (index, direction) => {
                const newOrder = [...chartOrder];
                if (direction === 'up' && index > 0) [newOrder[index - 1], newOrder[index]] = [newOrder[index], newOrder[index - 1]];
                else if (direction === 'down' && index < newOrder.length - 1) [newOrder[index + 1], newOrder[index]] = [newOrder[index], newOrder[index + 1]];
                setChartOrder(newOrder);
            };

            const handleDragStart = (e, id) => { e.dataTransfer.setData("text/plain", id); e.dataTransfer.effectAllowed = "move"; };
            const handleDrop = (e, targetId) => {
                e.preventDefault();
                const draggedId = e.dataTransfer.getData("text");
                if (draggedId && draggedId !== targetId) {
                    const newOrder = [...chartOrder];
                    newOrder.splice(newOrder.indexOf(draggedId), 1);
                    newOrder.splice(newOrder.indexOf(targetId), 0, draggedId);
                    setChartOrder(newOrder);
                }
            };

            const activeCardsData = useMemo(() => {
                const processed = [];
                let grandTotal = 0, u1Grand = 0, u2Grand = 0;

                sortedCardList.forEach(cardName => {
                    if (!formData[cardName]) return;
                    const data = formData[cardName];
                    const totalAmt = parseFloat(data.total);
                    if (!isNaN(totalAmt) && totalAmt > 0) {
                        let totalOverrides = 0, u1Share = 0, u2Share = 0;
                        const cleanOverrides = [];

                        data.overrides.forEach(ov => {
                            const amt = parseFloat(ov.amount);
                            if (!isNaN(amt) && amt > 0) {
                                totalOverrides += amt;
                                cleanOverrides.push({ ...ov, amount: amt });
                                if (ov.owner === user1Name) u1Share += amt;
                                if (ov.owner === user2Name) u2Share += amt;
                            }
                        });

                        const remaining = Math.max(0, totalAmt - totalOverrides);
                        const defaultOwner = rules.cards[cardName] || 'Split';

                        if (defaultOwner === user1Name) u1Share += remaining;
                        else if (defaultOwner === user2Name) u2Share += remaining;
                        else { u1Share += (remaining / 2); u2Share += (remaining / 2); }

                        processed.push({ cardName, total: totalAmt, u1Share, u2Share, overrides: cleanOverrides });
                        grandTotal += totalAmt; u1Grand += u1Share; u2Grand += u2Share;
                    }
                });

                let offlineTotal = 0, offU1 = 0, offU2 = 0;
                const cleanOfflineOverrides = [];

                offlineSpends.forEach(exp => {
                    const amt = parseFloat(exp.amount);
                    if (!isNaN(amt) && amt > 0 && exp.desc.trim() !== '') {
                        offlineTotal += amt;
                        let finalOwner = exp.owner === 'Auto' ? (rules.categories[exp.desc] || 'Split') : exp.owner;
                        cleanOfflineOverrides.push({ desc: exp.desc, amount: amt, owner: finalOwner });

                        if (finalOwner === user1Name) offU1 += amt;
                        else if (finalOwner === user2Name) offU2 += amt;
                        else { offU1 += (amt / 2); offU2 += (amt / 2); }
                    }
                });

                if (offlineTotal > 0) {
                    processed.push({ cardName: 'Offline & Fixed Spends', total: offlineTotal, u1Share: offU1, u2Share: offU2, overrides: cleanOfflineOverrides });
                    grandTotal += offlineTotal; u1Grand += offU1; u2Grand += offU2;
                }

                let loanU1 = 0, loanU2 = 0;
                const cleanLoanOverrides = [];

                loans.forEach(loan => {
                    const amt = parseFloat(loan.amount);
                    if (!isNaN(amt) && amt > 0 && loan.desc.trim() !== '') {
                        cleanLoanOverrides.push({ desc: loan.desc, amount: amt, owner: `Borrower: ${loan.borrower}` });
                        if (loan.borrower === user1Name) { loanU1 += amt; loanU2 -= amt; } 
                        else if (loan.borrower === user2Name) { loanU2 += amt; loanU1 -= amt; }
                    }
                });

                if (cleanLoanOverrides.length > 0) {
                    processed.push({ cardName: 'Inter-Personal Adjustments', total: 0, u1Share: loanU1, u2Share: loanU2, overrides: cleanLoanOverrides });
                    u1Grand += loanU1; u2Grand += loanU2;
                }

                return { cards: processed, summary: { total: grandTotal, u1Total: u1Grand, u2Total: u2Grand } };
            }, [formData, offlineSpends, loans, rules, user1Name, user2Name, sortedCardList]);

            const syncToSheets = async () => {
                if (!scriptUrl.trim()) return alert('Please set your Apps Script URL in settings.');
                if (!activeCardsData.cards.length) return alert('No data to sync.');
                
                setIsSyncing(true);
                const payload = { action: 'syncMonth', month: selectedMonth, summary: activeCardsData.summary, cards: activeCardsData.cards };

                try {
                    await fetch(scriptUrl.trim(), { 
                        method: 'POST', 
                        body: JSON.stringify(payload),
                        mode: 'no-cors' 
                    });
                    
                    alert(`Successfully synced ${selectedMonth} to Sheets!`);
                    const reset = {};
                    sortedCardList.forEach(c => reset[c] = { total: '', overrides: [] });
                    setFormData(reset);
                    setOfflineSpends(initOfflineSpends());
                    setLoans([]);
                    setTimeout(fetchAllData, 1000);
                } catch (error) {
                    alert('Error syncing to Sheet. Check network connection.');
                } finally {
                    setIsSyncing(false);
                }
            };

            const consolidateCards = (cardsArray) => {
                const map = {};
                cardsArray.forEach(c => {
                    if (!c || !c[0] || !c[1]) return;
                    const key = c[1]; 
                    if(!map[key]) map[key] = { month: toYYYYMM(c[0]), name: c[1], total: 0, u1: 0, u2: 0, overrides: [] };
                    map[key].total += parseFloat(c[2]) || 0;
                    map[key].u1 += parseFloat(c[3]) || 0;
                    map[key].u2 += parseFloat(c[4]) || 0;
                    if (c[5] && String(c[5]) !== 'None') {
                        map[key].overrides.push(...String(c[5]).split(' | '));
                    }
                });
                return Object.values(map).map(c => [
                    c.month,
                    c.name,
                    c.total,
                    c.u1,
                    c.u2,
                    c.overrides.length > 0 ? c.overrides.join(' | ') : 'None'
                ]);
            };

            const { chartData, pieData, lastMonthData } = useMemo(() => {
                if (!fetchedSummary || fetchedSummary.length === 0) return { chartData: [], pieData: [], lastMonthData: null };

                const aggSum = {};
                fetchedSummary.forEach(row => {
                    if (!row || !row[0]) return;
                    const m = toYYYYMM(row[0]);
                    if (!aggSum[m]) aggSum[m] = { month: m, total: 0, u1: 0, u2: 0 };
                    aggSum[m].total += parseFloat(row[1]) || 0;
                    aggSum[m].u1 += parseFloat(row[2]) || 0;
                    aggSum[m].u2 += parseFloat(row[3]) || 0;
                });
                
                let sortedAggSum = Object.values(aggSum).sort((a, b) => a.month.localeCompare(b.month));
                if (sortedAggSum.length === 0) return { chartData: [], pieData: [], lastMonthData: null };

                let filteredSummary = sortedAggSum;
                const currentYear = new Date().getFullYear();

                if (timeframe === 'Rolling 12') {
                    filteredSummary = sortedAggSum.slice(-12);
                } else if (timeframe === 'CY') {
                    filteredSummary = sortedAggSum.filter(r => r.month.startsWith(currentYear.toString()));
                } else if (timeframe === 'FY') {
                    const currentMonth = new Date().getMonth() + 1;
                    const startYear = currentMonth >= 4 ? currentYear : currentYear - 1;
                    const fyStart = `${startYear}-04`;
                    const fyEnd = `${startYear + 1}-03`;
                    filteredSummary = sortedAggSum.filter(r => r.month >= fyStart && r.month <= fyEnd);
                }

                let totalU1AllTime = 0;
                let totalU2AllTime = 0;

                const cData = filteredSummary.map(row => {
                    const month = row.month;
                    const totalSpend = row.total;
                    const u1Total = row.u1;
                    const u2Total = row.u2;

                    totalU1AllTime += u1Total;
                    totalU2AllTime += u2Total;

                    let monthCards = fetchedCards.filter(c => c && c[0] && toYYYYMM(c[0]) === month);
                    monthCards = consolidateCards(monthCards);
                    
                    let oneOffAmount = 0;
                    let hhTotal = 0;
                    let dedU1 = 0;
                    let dedU2 = 0;

                    monthCards.forEach(c => {
                        const deds = parseDeductionsLog(c[5]);
                        deds.forEach(d => {
                            if (d && d.desc && d.owner) {
                                const isHousehold = DEFAULT_OFFLINE_SPENDS.some(def => d.desc.toLowerCase().includes(def.toLowerCase()));
                                if (isHousehold) {
                                    hhTotal += d.amount;
                                } else if (c[1] !== 'Inter-Personal Adjustments') {
                                    oneOffAmount += d.amount;
                                    if (d.owner.includes(user1Name)) dedU1 += d.amount;
                                    if (d.owner.includes(user2Name)) dedU2 += d.amount;
                                }
                            }
                        });
                    });

                    return {
                        name: formatMonthName(month),
                        Total: totalSpend,
                        Household: hhTotal,
                        Baseline: totalSpend - oneOffAmount,
                        [user1Name]: dedU1,
                        [user2Name]: dedU2
                    };
                });

                const pData = [{ name: user1Name, value: totalU1AllTime }, { name: user2Name, value: totalU2AllTime }];
                
                const lastAggSum = sortedAggSum[sortedAggSum.length - 1];
                let cardsForLastMonth = fetchedCards.filter(c => c && c[0] && toYYYYMM(c[0]) === lastAggSum.month);
                cardsForLastMonth = consolidateCards(cardsForLastMonth);

                const lmData = { 
                    month: formatMonthName(lastAggSum.month), 
                    total: lastAggSum.total, 
                    u1Total: lastAggSum.u1, 
                    u2Total: lastAggSum.u2, 
                    cards: cardsForLastMonth 
                };

                return { chartData: cData, pieData: pData, lastMonthData: lmData };
            }, [fetchedSummary, fetchedCards, user1Name, user2Name, timeframe]);

            const uniqueMonths = useMemo(() => {
                return [...new Set(fetchedSummary.filter(s => s && s[0]).map(s => toYYYYMM(s[0])))].sort().reverse();
            }, [fetchedSummary]);

            const historyMonthData = useMemo(() => {
                if (!historyMonth || !fetchedSummary || fetchedSummary.length === 0) return null;
                
                let total = 0, u1Total = 0, u2Total = 0;
                const monthRows = fetchedSummary.filter(r => r && r[0] && toYYYYMM(r[0]) === historyMonth);
                if (monthRows.length === 0) return null;

                monthRows.forEach(r => {
                    total += parseFloat(r[1]) || 0;
                    u1Total += parseFloat(r[2]) || 0;
                    u2Total += parseFloat(r[3]) || 0;
                });
                
                let cardsForMonth = fetchedCards.filter(c => c && c[0] && toYYYYMM(c[0]) === historyMonth);
                cardsForMonth = consolidateCards(cardsForMonth);
                
                if (searchQuery.trim()) {
                    const lowerQ = searchQuery.toLowerCase();
                    cardsForMonth = cardsForMonth.filter(c => {
                        const nameMatch = (c[1] || '').toLowerCase().includes(lowerQ);
                        const descMatch = (c[5] && String(c[5]).toLowerCase().includes(lowerQ));
                        return nameMatch || descMatch;
                    });
                }

                return { month: formatMonthName(historyMonth), total, u1Total, u2Total, cards: cardsForMonth };
            }, [historyMonth, fetchedSummary, fetchedCards, searchQuery]);

            const generateShareText = (type, customData = null) => {
                const e = {
                    chart: '\uD83D\uDCCA', cal: '\uD83D\uDCC5', money: '\uD83D\uDCB0', down: '\uD83D\uDCC9', 
                    u1: '\uD83D\uDD35', u2: '\uD83D\uDFE3', sparkle: '\u2728', card: '\uD83D\uDCB3', 
                    dot: '\uD83D\uDD39', pin: '\uD83D\uDCCC', home: '\uD83C\uDFE0', sync: '\uD83D\uDD04', 
                    smalldot: '\u25AB\uFE0F', line: '━━━━━━━━━━━━━━━━━━━━━'
                };

                const buildInsightsText = () => {
                    if (chartData.length === 0) return `${e.chart} *BILLSPLIT INSIGHTS*\nNo data available.\n\n`;
                    const totalTracked = pieData.reduce((acc, curr) => acc + curr.value, 0);
                    const avgSpend = totalTracked / chartData.length;
                    
                    let insights = `${e.chart} *BILLSPLIT INSIGHTS*\n`;
                    insights += `⏳ _${timeframe.toUpperCase()}_\n`;
                    insights += `${e.line}\n\n`;
                    insights += `${e.cal} *Months Tracked:* ${chartData.length}\n\n`;
                    insights += `${e.money} *Household Spend:* ${formatMoney(totalTracked)}\n`;
                    insights += `${e.down} *Monthly Average:* ${formatMoney(avgSpend)}\n\n`;
                    insights += `${e.u1} *${user1Name}'s Share:* ${formatMoney(pieData[0].value)}\n`;
                    insights += `${e.u2} *${user2Name}'s Share:* ${formatMoney(pieData[1].value)}\n\n`;
                    insights += `${e.line}\n`;
                    insights += `${e.sparkle} _Generated via BillSplit_`;
                    return insights;
                };

                const buildMonthText = (dataObj, label = "LAST MONTH") => {
                    if (!dataObj) return `${e.chart} *${label} SUMMARY*\nNo data available.\n\n`;
                    let mText = `${e.chart} *${label.toUpperCase()} SUMMARY*\n`;
                    mText += `${e.cal} *MONTH:* ${dataObj.month.toUpperCase()}\n`;
                    mText += `${e.line}\n\n`;
                    mText += `${e.money} *Total Household Spend:* ${formatMoney(dataObj.total)}\n\n`;
                    mText += `${e.u1} *${user1Name}'s Share:* ${formatMoney(dataObj.u1Total)}\n`;
                    mText += `${e.u2} *${user2Name}'s Share:* ${formatMoney(dataObj.u2Total)}\n\n`;

                    if (dataObj.cards.length > 0) {
                        const ccData = dataObj.cards.filter(c => c[1] !== 'Offline & Fixed Spends' && c[1] !== 'Inter-Personal Adjustments');
                        const offlineData = dataObj.cards.find(c => c[1] === 'Offline & Fixed Spends');
                        const loanData = dataObj.cards.find(c => c[1] === 'Inter-Personal Adjustments');

                        if (ccData.length > 0) {
                            mText += `${e.line}\n`;
                            mText += `${e.card} *CREDIT CARDS*\n\n`;
                            ccData.forEach(c => {
                                mText += `${e.dot} *${c[1]}* \n     ${formatMoney(c[2])}\n`;
                                mText += `     ↳ ${user1Name}: ${formatMoney(c[3])} | ${user2Name}: ${formatMoney(c[4])}\n`;
                                if (c[5] && c[5] !== 'None') {
                                    String(c[5]).split(' | ').forEach(ov => { mText += `     ${e.pin} _${formatOverrideString(ov)}_\n`; });
                                }
                                mText += `\n`;
                            });
                        }

                        if (offlineData && offlineData[5] !== 'None') {
                            mText += `${e.line}\n`;
                            mText += `${e.home} *FIXED & OFFLINE SPENDS*\n\n`;
                            mText += `${e.dot} *Total Expenses* \n     ${formatMoney(offlineData[2])}\n`;
                            mText += `     ↳ ${user1Name}: ${formatMoney(offlineData[3])} | ${user2Name}: ${formatMoney(offlineData[4])}\n`;
                            String(offlineData[5]).split(' | ').forEach(ov => { mText += `     ${e.smalldot} _${formatOverrideString(ov)}_\n`; });
                            mText += `\n`;
                        }

                        if (loanData && loanData[5] !== 'None') {
                            mText += `${e.line}\n`;
                            mText += `${e.sync} *INTER-PERSONAL ADJUSTMENTS*\n\n`;
                            String(loanData[5]).split(' | ').forEach(ov => { mText += `     ${e.smalldot} _${formatOverrideString(ov)}_\n`; });
                            mText += `\n`;
                        }
                    }
                    mText += `${e.line}\n`;
                    mText += `${e.sparkle} _Generated via BillSplit_`;
                    return mText;
                };

                if (type === 'insights') return buildInsightsText();
                if (type === 'lastMonth') return buildMonthText(lastMonthData, "LAST MONTH");
                if (type === 'both') return buildInsightsText() + `\n\n` + buildMonthText(lastMonthData, "LAST MONTH");
                if (type === 'history') return buildMonthText(customData, "MONTHLY");
                return '';
            };

            const handleShare = (type, customData = null) => {
                const text = generateShareText(type, customData);
                window.open(`https://wa.me/?text=${encodeURIComponent(text.trim())}`);
                setShareModalOpen(false);
            };

            const handleCopy = (type, customData = null) => {
                const text = generateShareText(type, customData);
                navigator.clipboard.writeText(text).then(() => {
                    alert("Text copied to clipboard!");
                    setShareModalOpen(false);
                });
            };

            const toggleChart = (e, id) => {
                e.stopPropagation();
                setMinimizedCharts(prev => ({...prev, [id]: !prev[id]}));
            };

            const COLORS = ['#3b82f6', '#a855f7'];

            const renderUserBreakdown = (userName, cardsData) => {
                if (!cardsData || cardsData.length === 0) return null;
                
                let ccSpends = [];
                let hhSpends = [];
                let specificDeds = [];

                let ccTotal = 0;
                let hhTotal = 0;
                let dedTotal = 0;

                const isUser1 = userName === user1Name;
                
                cardsData.forEach(c => {
                    if (!c) return;
                    const isArray = Array.isArray(c);
                    const cName = (isArray ? c[1] : c.cardName) || 'Unknown';
                    const uShare = isArray ? (parseFloat(c[isUser1 ? 3 : 4]) || 0) : (parseFloat(isUser1 ? c.u1Share : c.u2Share) || 0);
                    
                    let overrides = [];
                    if (isArray) {
                        overrides = parseDeductionsLog(c[5]);
                    } else {
                        overrides = c.overrides || [];
                    }

                    if (cName === 'Offline & Fixed Spends') {
                        overrides.forEach(ov => {
                            if (!ov || !ov.owner) return;
                            let itemShare = 0;
                            if (ov.owner === userName) itemShare = parseFloat(ov.amount) || 0;
                            else if (ov.owner === 'Split') itemShare = (parseFloat(ov.amount) || 0) / 2;
                            
                            if (itemShare > 0) {
                                hhSpends.push({ desc: ov.desc || 'Item', amount: itemShare });
                                hhTotal += itemShare;
                            }
                        });
                    } else if (cName === 'Inter-Personal Adjustments') {
                        // Skip rendering loans in the standard breakdown
                    } else {
                        let cardBaseShare = uShare;
                        overrides.forEach(ov => {
                            if (!ov || !ov.owner) return;
                            if (ov.owner === userName || ov.owner === 'Split') {
                                const dedAmt = ov.owner === userName ? (parseFloat(ov.amount) || 0) : (parseFloat(ov.amount) || 0) / 2;
                                const ovDesc = ov.desc || '';
                                
                                const isHousehold = DEFAULT_OFFLINE_SPENDS.some(def => ovDesc.toLowerCase().includes(def.toLowerCase()));
                                
                                if (isHousehold) {
                                    hhSpends.push({ desc: `${ovDesc} (${cName})`, amount: dedAmt });
                                    hhTotal += dedAmt;
                                    cardBaseShare -= dedAmt;
                                } else {
                                    specificDeds.push({ desc: `${ovDesc} (${cName})`, amount: dedAmt });
                                    dedTotal += dedAmt;
                                    cardBaseShare -= dedAmt;
                                }
                            }
                        });

                        if (cardBaseShare > 0) {
                            ccSpends.push({ desc: cName, amount: cardBaseShare });
                            ccTotal += cardBaseShare;
                        }
                    }
                });

                return (
                    <div className="mt-4 mb-2 p-4 bg-white rounded-xl shadow-sm border border-gray-200 text-sm animate-[slideUp_0.2s_ease-out]">
                        <div className="flex justify-between items-center border-b pb-2 mb-3">
                            <h4 className="font-bold text-gray-800"><i className="fa-solid fa-chart-pie text-teal-600 mr-2"></i>{userName}'s Breakdown</h4>
                            <button onClick={() => setExpandedUser(null)} className="text-gray-400 hover:text-red-500 transition-colors w-6 h-6 flex items-center justify-center rounded-full bg-gray-100 hover:bg-red-50"><i className="fa-solid fa-times text-xs"></i></button>
                        </div>

                        <div className="space-y-4">
                            {hhSpends.length > 0 && (
                                <div>
                                    <div className="flex justify-between font-bold text-teal-700 mb-2 text-[11px] uppercase tracking-widest border-b border-teal-100 pb-1">
                                        <span>Household Spends</span>
                                        <span>{formatMoney(hhTotal)}</span>
                                    </div>
                                    <div className="space-y-1.5">
                                        {hhSpends.map((item, i) => (
                                            <div key={i} className="flex justify-between text-gray-600 text-xs pl-1">
                                                <span className="truncate pr-2"><i className="fa-solid fa-angle-right text-[8px] text-teal-300 mr-1.5"></i>{item.desc}</span>
                                                <span className="font-medium">{formatMoney(item.amount)}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {ccSpends.length > 0 && (
                                <div>
                                    <div className="flex justify-between font-bold text-blue-700 mb-2 text-[11px] uppercase tracking-widest border-b border-blue-100 pb-1">
                                        <span>Credit Card Spends</span>
                                        <span>{formatMoney(ccTotal)}</span>
                                    </div>
                                    <div className="space-y-1.5">
                                        {ccSpends.map((item, i) => (
                                            <div key={i} className="flex justify-between text-gray-600 text-xs pl-1">
                                                <span className="truncate pr-2"><i className="fa-regular fa-credit-card text-[9px] text-blue-300 mr-1.5"></i>{item.desc}</span>
                                                <span className="font-medium">{formatMoney(item.amount)}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {specificDeds.length > 0 && (
                                <div>
                                    <div className="flex justify-between font-bold text-purple-700 mb-2 text-[11px] uppercase tracking-widest border-b border-purple-100 pb-1">
                                        <span>Specific Deductions</span>
                                        <span>{formatMoney(dedTotal)}</span>
                                    </div>
                                    <div className="space-y-1.5">
                                        {specificDeds.map((item, i) => (
                                            <div key={i} className="flex justify-between text-gray-600 text-xs pl-1">
                                                <span className="truncate pr-2"><i className="fa-solid fa-tag text-[9px] text-purple-300 mr-1.5"></i>{item.desc}</span>
                                                <span className="font-medium">{formatMoney(item.amount)}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderChart = (id, index) => {
                const isMin = minimizedCharts[id];
                let title = "", subtitle = "";
                if (id === 'trend') { title = "Household Spend Trend"; subtitle = "Total gross vs baseline vs actual household."; }
                if (id === 'pie') { title = `${timeframe} Aggregate Split`; subtitle = "Overall cumulative share breakdown."; }
                if (id === 'bar') { title = "Ad-hoc Spend Volume"; subtitle = "Individual spikes parsed from ad-hoc spends."; }

                return (
                    <div key={id} draggable onDragStart={(e) => handleDragStart(e, id)} onDragOver={(e) => e.preventDefault()} onDrop={(e) => handleDrop(e, id)} className="bg-white border rounded-xl p-4 shadow-sm mb-6 relative cursor-move hover:shadow-md transition-shadow pt-12">
                        
                        <div className="absolute top-3 right-3 flex items-center gap-2 z-10">
                            {!isMin && (
                                <div className="flex bg-gray-100 rounded-lg overflow-hidden border border-gray-200">
                                    <button onClick={() => moveChart(index, 'up')} disabled={index === 0} className="px-2 py-1 hover:bg-gray-200 hover:text-teal-600 disabled:opacity-30 border-r border-gray-200"><i className="fa-solid fa-arrow-up text-xs"></i></button>
                                    <button onClick={() => moveChart(index, 'down')} disabled={index === chartOrder.length - 1} className="px-2 py-1 hover:bg-gray-200 hover:text-teal-600 disabled:opacity-30"><i className="fa-solid fa-arrow-down text-xs"></i></button>
                                </div>
                            )}
                            <button onClick={(e) => toggleChart(e, id)} className={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold border shadow-sm transition-colors ${isMin ? 'bg-teal-50 text-teal-700 border-teal-200 hover:bg-teal-100' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>
                                {isMin ? <><i className="fa-solid fa-expand"></i> Expand</> : <><i className="fa-solid fa-compress"></i> Minimize</>}
                            </button>
                        </div>
                        
                        <div className="pr-2">
                            <p className="text-sm font-bold text-gray-700 mb-1">{title}</p>
                            {!isMin && <p className="text-[10px] text-gray-500 mb-3 leading-tight">{subtitle}</p>}
                        </div>

                        {!isMin && id === 'trend' && (
                            <div className="h-64 mt-4">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={chartData} margin={{ top: 5, right: 10, left: -20, bottom: 5 }}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e5e7eb" />
                                        <XAxis dataKey="name" tick={{fontSize: 10}} tickMargin={10} axisLine={false} tickLine={false} />
                                        <YAxis tickFormatter={(val) => `₹${val/1000}k`} tick={{fontSize: 10}} axisLine={false} tickLine={false} />
                                        <Tooltip formatter={(value) => formatMoney(value)} labelStyle={{color: '#333', fontWeight: 'bold', fontSize: '12px'}} itemStyle={{fontSize: '12px'}} />
                                        <Legend wrapperStyle={{fontSize: '11px', paddingTop: '10px'}} />
                                        <Line type="monotone" name="Total Spend" dataKey="Total" stroke="#0f766e" strokeWidth={3} dot={{r: 3, fill: '#0f766e'}} />
                                        <Line type="monotone" name="Baseline" dataKey="Baseline" stroke="#94a3b8" strokeWidth={2} strokeDasharray="4 4" dot={false} />
                                        <Line type="monotone" name="Household" dataKey="Household" stroke="#eab308" strokeWidth={3} dot={{r: 3, fill: '#eab308'}} />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                        )}

                        {!isMin && id === 'pie' && (
                            <div className="h-48 relative mt-4">
                                <ResponsiveContainer width="100%" height="100%">
                                    <PieChart>
                                        <Pie data={pieData} cx="50%" cy="50%" innerRadius={50} outerRadius={70} paddingAngle={2} dataKey="value" stroke="none">
                                            {pieData.map((entry, idx) => <Cell key={`cell-${idx}`} fill={COLORS[idx % COLORS.length]} />)}
                                        </Pie>
                                        <Tooltip formatter={(value) => formatMoney(value)} itemStyle={{fontSize: '12px'}} />
                                    </PieChart>
                                </ResponsiveContainer>
                                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-1">
                                    <div className="flex items-center gap-1 text-[10px] font-bold text-blue-600"><span className="w-2 h-2 rounded-full bg-blue-500"></span>{user1Name}</div>
                                    <div className="flex items-center gap-1 text-[10px] font-bold text-purple-600"><span className="w-2 h-2 rounded-full bg-purple-500"></span>{user2Name}</div>
                                </div>
                            </div>
                        )}

                        {!isMin && id === 'bar' && (
                            <div className="h-48 mt-4">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={chartData} margin={{ top: 5, right: 10, left: -20, bottom: 5 }}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e5e7eb" />
                                        <XAxis dataKey="name" tick={{fontSize: 10}} tickMargin={10} axisLine={false} tickLine={false} />
                                        <YAxis tickFormatter={(val) => `₹${val/1000}k`} tick={{fontSize: 10}} axisLine={false} tickLine={false} />
                                        <Tooltip formatter={(value) => formatMoney(value)} labelStyle={{fontSize: '12px', fontWeight: 'bold'}} itemStyle={{fontSize: '12px'}} cursor={{fill: '#f8fafc'}} />
                                        <Bar dataKey={user1Name} stackId="a" fill="#3b82f6" radius={[0, 0, 4, 4]} maxBarSize={30} />
                                        <Bar dataKey={user2Name} stackId="a" fill="#a855f7" radius={[4, 4, 0, 0]} maxBarSize={30} />
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto bg-gray-100 min-h-screen shadow-lg pb-24 relative">
                    <header className="bg-teal-700 text-white p-4 sticky top-0 z-30 shadow-md flex justify-between items-center">
                        <h1 className="text-xl font-bold"><i className="fa-solid fa-file-invoice-dollar mr-2"></i>BillSplit</h1>
                        <button onClick={() => setView('settings')} className="text-white hover:text-teal-200">
                            <i className="fa-solid fa-gear text-lg"></i>
                        </button>
                    </header>

                    <main className="p-4">
                        {view === 'entry' && (
                            <div className="space-y-5">
                                <div className="bg-teal-50 border border-teal-100 p-4 rounded-xl flex justify-between items-center shadow-sm">
                                    <span className="font-bold text-teal-800">Billing Month:</span>
                                    <input type="month" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} className="border p-2 rounded-lg text-sm bg-white font-semibold text-gray-800 outline-none focus:ring-2 focus:ring-teal-500" />
                                </div>

                                <div>
                                    <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wide mb-3 border-b pb-1">Credit Card Bills</h2>
                                    {sortedCardList.length === 0 && <p className="text-sm text-gray-400 italic">No cards available. Check Settings connection.</p>}
                                    <div className="space-y-3">
                                        {sortedCardList.map(card => formData[card] && (
                                            <div key={card} className={`border rounded-xl p-3 transition-colors ${formData[card].total ? 'bg-white shadow-sm border-teal-300' : 'bg-gray-50 border-gray-200'}`}>
                                                <div className="flex justify-between items-center">
                                                    <label className={`text-sm font-bold ${formData[card].total ? 'text-teal-800' : 'text-gray-600'}`}>{card}</label>
                                                    <input type="number" placeholder="₹ 0.00" value={formData[card].total} onChange={e => handleTotalChange(card, e.target.value)} className="w-1/3 border p-2 rounded text-right font-bold text-gray-800 bg-white focus:ring-2 focus:ring-teal-500 outline-none" />
                                                </div>

                                                {formData[card].total && (
                                                    <div className="mt-3 pt-3 border-t border-gray-100">
                                                        {formData[card].overrides.map(ov => (
                                                            <div key={ov.id} className="flex gap-2 mb-2 relative bg-gray-50 p-2 rounded border">
                                                                <button onClick={() => removeOverride(card, ov.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 border border-red-200 rounded-full w-5 h-5 flex items-center justify-center shadow-sm"><i className="fa-solid fa-xmark text-[10px]"></i></button>
                                                                <input type="text" placeholder="Desc..." value={ov.desc} onChange={e => updateOverride(card, ov.id, 'desc', e.target.value)} className="w-2/5 text-xs p-1.5 rounded border" />
                                                                <input type="number" placeholder="₹" value={ov.amount} onChange={e => updateOverride(card, ov.id, 'amount', e.target.value)} className="w-1/4 text-xs p-1.5 rounded border" />
                                                                <select value={ov.owner} onChange={e => updateOverride(card, ov.id, 'owner', e.target.value)} className="w-1/3 text-xs p-1.5 rounded border bg-white font-semibold">
                                                                    <option value={user1Name}>{user1Name}</option>
                                                                    <option value={user2Name}>{user2Name}</option>
                                                                </select>
                                                            </div>
                                                        ))}
                                                        <button onClick={() => addOverride(card)} className="text-xs text-teal-600 font-bold flex items-center gap-1 hover:text-teal-800">
                                                            <i className="fa-solid fa-plus-circle"></i> Ad-hoc Spend
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="mt-8">
                                    <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wide mb-3 border-b pb-1">Fixed & Offline Spends</h2>
                                    <div className="space-y-2">
                                        {offlineSpends.map(exp => (
                                            <div key={exp.id} className={`flex gap-2 items-center p-2 border rounded-lg ${exp.amount ? 'bg-white border-teal-300 shadow-sm' : 'bg-gray-50'}`}>
                                                {exp.isCustom && <button onClick={() => removeOfflineSpend(exp.id)} className="text-red-400 hover:text-red-600 px-1"><i className="fa-solid fa-circle-minus"></i></button>}
                                                <input type="text" placeholder="Description" value={exp.desc} readOnly={!exp.isCustom} onChange={e => handleOfflineChange(exp.id, 'desc', e.target.value)} className={`w-2/5 text-xs p-2 rounded ${!exp.isCustom ? 'bg-transparent font-bold text-gray-700' : 'border bg-white'}`} />
                                                <input type="number" placeholder="₹ 0.00" value={exp.amount} onChange={e => handleOfflineChange(exp.id, 'amount', e.target.value)} className="w-1/4 text-xs p-2 rounded border bg-white font-bold focus:ring-1 focus:ring-teal-500 outline-none text-right" />
                                                <select value={exp.owner} onChange={e => handleOfflineChange(exp.id, 'owner', e.target.value)} className="w-1/3 text-xs p-2 rounded border bg-white text-gray-700">
                                                    <option value="Auto">Auto (Rule)</option> 
                                                    <option value="Split">Split 50/50</option>
                                                    <option value={user1Name}>{user1Name}</option>
                                                    <option value={user2Name}>{user2Name}</option>
                                                </select>
                                            </div>
                                        ))}
                                        <button onClick={addCustomOfflineSpend} className="text-xs text-teal-600 font-bold flex items-center gap-1 hover:text-teal-800 mt-2 p-1">
                                            <i className="fa-solid fa-plus-circle"></i> Add Spend
                                        </button>
                                    </div>
                                </div>

                                <div className="mt-8">
                                    <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wide mb-3 border-b pb-1">Inter-Personal Adjustments</h2>
                                    <div className="space-y-2">
                                        {loans.map(loan => (
                                            <div key={loan.id} className={`flex gap-2 items-center p-2 border rounded-lg ${loan.amount ? 'bg-white border-teal-300 shadow-sm' : 'bg-gray-50'}`}>
                                                <button onClick={() => removeLoan(loan.id)} className="text-red-400 hover:text-red-600 px-1"><i className="fa-solid fa-circle-minus"></i></button>
                                                <input type="text" placeholder="Details (e.g. Cash Loan)" value={loan.desc} onChange={e => handleLoanChange(loan.id, 'desc', e.target.value)} className="w-2/5 text-xs p-2 rounded border bg-white" />
                                                <input type="number" placeholder="₹ 0.00" value={loan.amount} onChange={e => handleLoanChange(loan.id, 'amount', e.target.value)} className="w-1/4 text-xs p-2 rounded border bg-white font-bold focus:ring-1 focus:ring-teal-500 outline-none text-right" />
                                                <div className="w-1/3 text-xs flex flex-col">
                                                    <span className="text-[10px] text-gray-500 leading-none mb-1">Borrower:</span>
                                                    <select value={loan.borrower} onChange={e => handleLoanChange(loan.id, 'borrower', e.target.value)} className="p-1 rounded border bg-white font-semibold text-gray-700">
                                                        <option value={user1Name}>{user1Name}</option>
                                                        <option value={user2Name}>{user2Name}</option>
                                                    </select>
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={addLoan} className="text-xs text-teal-600 font-bold flex items-center gap-1 hover:text-teal-800 mt-2 p-1">
                                            <i className="fa-solid fa-plus-circle"></i> Borrow
                                        </button>
                                    </div>
                                </div>

                                <div className="pt-4 border-t mt-6 flex gap-3">
                                    <button onClick={resetForm} className="w-1/3 border-2 border-red-400 text-red-500 bg-red-50 rounded-lg p-3 font-bold text-sm hover:bg-red-100 transition-colors">Reset All</button>
                                    <button onClick={submitForCalculation} className="w-2/3 bg-teal-700 text-white rounded-lg p-3 font-bold text-sm shadow-md hover:bg-teal-800 transition-colors flex justify-center items-center gap-2">Review Draft <i className="fa-solid fa-arrow-right"></i></button>
                                </div>
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <div className="space-y-6">
                                {isLoadingInitial && (
                                    <div className="text-center py-10 text-gray-500">
                                        <i className="fa-solid fa-spinner fa-spin text-3xl mb-2 text-teal-600"></i>
                                        <p>Fetching insights...</p>
                                    </div>
                                )}

                                {activeCardsData.cards.length > 0 && (
                                    <div className="bg-white border-2 border-amber-300 rounded-xl p-4 shadow-md relative">
                                        <div className="absolute top-0 right-0 bg-amber-300 text-amber-900 text-[10px] font-bold px-2 py-1 rounded-bl-lg rounded-tr-xl uppercase tracking-wider">Unsaved Draft</div>
                                        <h3 className="font-bold text-gray-800 border-b pb-2 mb-3 mt-2"><i className="fa-solid fa-pen-nib mr-2"></i>Draft: {formatMonthName(selectedMonth)}</h3>
                                        
                                        <div className="flex justify-between items-end mb-4">
                                            <div>
                                                <p className="text-xs text-gray-500">Household Spend</p>
                                                <p className="text-2xl font-bold text-gray-800">{formatMoney(activeCardsData.summary.total)}</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-2 text-sm mb-2">
                                            <button onClick={() => setExpandedUser(expandedUser === user1Name ? null : user1Name)} className={`p-3 rounded-lg flex-1 text-center border transition-all ${expandedUser === user1Name ? 'bg-blue-50 border-blue-300 shadow-inner' : 'bg-gray-50 border-gray-200 hover:bg-blue-50'}`}>
                                                <span className="text-xs text-blue-500 font-semibold block mb-1">{user1Name}</span>
                                                <span className="font-bold text-base text-blue-800">{formatMoney(activeCardsData.summary.u1Total)}</span>
                                            </button>
                                            <button onClick={() => setExpandedUser(expandedUser === user2Name ? null : user2Name)} className={`p-3 rounded-lg flex-1 text-center border transition-all ${expandedUser === user2Name ? 'bg-purple-50 border-purple-300 shadow-inner' : 'bg-gray-50 border-gray-200 hover:bg-purple-50'}`}>
                                                <span className="text-xs text-purple-500 font-semibold block mb-1">{user2Name}</span>
                                                <span className="font-bold text-base text-purple-800">{formatMoney(activeCardsData.summary.u2Total)}</span>
                                            </button>
                                        </div>
                                        {expandedUser && renderUserBreakdown(expandedUser, activeCardsData.cards)}
                                        <button onClick={syncToSheets} disabled={isSyncing} className="mt-4 w-full bg-teal-700 text-white p-3 rounded-lg font-bold flex justify-center items-center gap-2 hover:bg-teal-800 shadow-sm">
                                            {isSyncing ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-cloud-arrow-up"></i>} Sync Draft to Sheet
                                        </button>
                                    </div>
                                )}

                                {!isLoadingInitial && fetchedSummary.length > 0 && (
                                    <button onClick={() => setShowHistory(true)} className="w-full bg-white border border-teal-200 text-teal-800 p-3 rounded-xl font-bold flex justify-center items-center gap-2 hover:bg-teal-50 shadow-sm transition-colors">
                                        <i className="fa-solid fa-clock-rotate-left"></i> View Historical Data
                                    </button>
                                )}

                                {!isLoadingInitial && chartData.length > 0 && (
                                    <div>
                                        <div className="flex justify-between items-center mb-4 px-1">
                                            <h3 className="font-bold text-gray-800"><i className="fa-solid fa-chart-line mr-2"></i>Insights</h3>
                                            <select value={timeframe} onChange={e => setTimeframe(e.target.value)} className="text-xs border p-1 rounded font-semibold text-gray-600 outline-none focus:ring-1 focus:ring-teal-500">
                                                <option value="Rolling 12">Rolling 12 Months</option>
                                                <option value="CY">This Year (CY)</option>
                                                <option value="FY">This Financial Year</option>
                                            </select>
                                        </div>
                                        {chartOrder.map((id, index) => renderChart(id, index))}
                                    </div>
                                )}

                                {!isLoadingInitial && fetchedSummary.length === 0 && !activeCardsData.cards.length && (
                                    <div className="text-center py-16 text-gray-400">
                                        <i className="fa-regular fa-folder-open text-5xl mb-4 opacity-50"></i>
                                        <p className="font-semibold text-gray-600 mb-1">No Historical Data</p>
                                        <p className="text-sm mb-6">Start logging to see insights.</p>
                                        <button onClick={() => setView('entry')} className="bg-teal-700 text-white px-6 py-2 rounded-full font-bold shadow-md hover:bg-teal-800">
                                            Log First Entry
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="space-y-6 pb-6">
                                <div className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm space-y-4">
                                    <h3 className="font-bold text-gray-700 border-b pb-2"><i className="fa-solid fa-gears mr-2"></i>Configuration</h3>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-500 mb-1">Apps Script Web App URL</label>
                                        <input type="text" value={scriptUrl} onChange={e => {setScriptUrl(e.target.value); localStorage.setItem('bs_script_url', e.target.value);}} className="w-full border p-2 rounded text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-500 mb-1">User 1</label>
                                            <input type="text" value={user1Name} onChange={e => {setUser1Name(e.target.value); localStorage.setItem('bs_user1_name', e.target.value);}} className="w-full border p-2 rounded text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-500 mb-1">User 2</label>
                                            <input type="text" value={user2Name} onChange={e => {setUser2Name(e.target.value); localStorage.setItem('bs_user2_name', e.target.value);}} className="w-full border p-2 rounded text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
                                        </div>
                                    </div>
                                    <button onClick={() => { setView('dashboard'); fetchAllData(); }} className="w-full bg-gray-800 text-white p-3 rounded-lg font-bold mt-4 hover:bg-gray-900 shadow-md">Save & Refresh Dashboard</button>
                                </div>

                                <div className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm space-y-4">
                                    <h3 className="font-bold text-gray-700 border-b pb-2"><i className="fa-regular fa-credit-card mr-2"></i>Manage Cards</h3>
                                    <div className="flex gap-2">
                                        <input type="text" placeholder="New Card Name..." value={newCardName} onChange={e => setNewCardName(e.target.value)} className="flex-1 border p-2 rounded text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
                                        <button onClick={handleAddCard} disabled={isAddingCard || !newCardName.trim()} className="bg-teal-600 text-white px-4 py-2 rounded font-bold text-sm hover:bg-teal-700 disabled:opacity-50">
                                            {isAddingCard ? <i className="fa-solid fa-spinner fa-spin"></i> : 'Add'}
                                        </button>
                                    </div>
                                    <div className="mt-4">
                                        <p className="text-xs font-bold text-gray-500 mb-2 uppercase">Active Cards</p>
                                        <div className="flex flex-wrap gap-2">
                                            {cardList.length > 0 ? cardList.map((c, i) => (
                                                <span key={i} className="bg-gray-100 border text-gray-700 text-xs px-2 py-1 rounded-full">{c}</span>
                                            )) : <span className="text-xs text-gray-400">No cards loaded.</span>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {showHistory && (
                        <div className="fixed inset-0 z-50 bg-gray-900 bg-opacity-60 flex justify-center items-end sm:items-center">
                            <div className="bg-white w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl flex flex-col overflow-hidden max-h-[90vh] animate-[slideUp_0.3s_ease-out]">
                                <div className="p-4 border-b flex justify-between items-center bg-teal-700 text-white">
                                    <h3 className="font-bold text-lg"><i className="fa-solid fa-clock-rotate-left mr-2"></i>Historical Log</h3>
                                    <button onClick={() => setShowHistory(false)} className="text-teal-100 hover:text-white p-1">
                                        <i className="fa-solid fa-xmark text-xl"></i>
                                    </button>
                                </div>
                                
                                <div className="p-4 flex-1 overflow-y-auto bg-gray-50">
                                    <div className="mb-4">
                                        <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Select Month</label>
                                        <select value={historyMonth} onChange={e => setHistoryMonth(e.target.value)} className="w-full border-2 border-teal-100 p-3 rounded-xl text-base bg-white font-bold text-teal-800 outline-none focus:ring-2 focus:ring-teal-500 shadow-sm">
                                            {uniqueMonths.map(m => (
                                                <option key={m} value={m}>{formatMonthName(m)}</option>
                                            ))}
                                        </select>
                                    </div>
                                    
                                    <div className="mb-6 relative">
                                        <i className="fa-solid fa-search absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                                        <input type="text" placeholder="Search cards or expenses..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full border p-2.5 pl-9 rounded-xl text-sm bg-white outline-none focus:ring-2 focus:ring-teal-500 shadow-sm" />
                                        {searchQuery && (
                                            <button onClick={() => setSearchQuery('')} className="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600"><i className="fa-solid fa-xmark text-sm"></i></button>
                                        )}
                                    </div>

                                    {historyMonthData ? (
                                        <div className="bg-white border rounded-xl p-4 shadow-sm relative">
                                            {!searchQuery.trim() && (
                                                <>
                                                    <div className="flex justify-between items-center mb-4">
                                                        <div className="text-gray-500 text-sm">Household Spend</div>
                                                        <div className="text-2xl font-bold text-gray-800">{formatMoney(historyMonthData.total)}</div>
                                                    </div>
                                                    <div className="flex gap-2 text-sm mb-2">
                                                        <button onClick={() => setExpandedUser(expandedUser === user1Name ? null : user1Name)} className={`p-3 rounded-lg flex-1 text-center border transition-all ${expandedUser === user1Name ? 'bg-blue-50 border-blue-300 shadow-inner' : 'bg-blue-50 border-blue-100 hover:bg-blue-100'}`}>
                                                            <span className="text-xs text-blue-500 font-semibold block mb-1">{user1Name}</span>
                                                            <span className="font-bold text-base text-blue-800">{formatMoney(historyMonthData.u1Total)}</span>
                                                        </button>
                                                        <button onClick={() => setExpandedUser(expandedUser === user2Name ? null : user2Name)} className={`p-3 rounded-lg flex-1 text-center border transition-all ${expandedUser === user2Name ? 'bg-purple-50 border-purple-300 shadow-inner' : 'bg-purple-50 border-purple-100 hover:bg-purple-100'}`}>
                                                            <span className="text-xs text-purple-500 font-semibold block mb-1">{user2Name}</span>
                                                            <span className="font-bold text-base text-purple-800">{formatMoney(historyMonthData.u2Total)}</span>
                                                        </button>
                                                    </div>
                                                    {expandedUser && renderUserBreakdown(expandedUser, historyMonthData.cards)}
                                                </>
                                            )}

                                            {historyMonthData.cards.length > 0 ? (
                                                <div className={`space-y-3 ${!searchQuery.trim() ? 'mt-6 border-t pt-4' : ''}`}>
                                                    <p className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2">{searchQuery.trim() ? 'Search Results' : 'Statement Breakdown'}</p>
                                                    {historyMonthData.cards.map((c, i) => (
                                                        <div key={i} className="bg-gray-50 p-3 rounded-lg border text-sm">
                                                            <div className="flex justify-between font-bold mb-2 text-gray-700">
                                                                <span>{c[1] || 'Unknown'}</span>
                                                                <span>{c[2] > 0 ? formatMoney(c[2]) : '---'}</span>
                                                            </div>
                                                            <div className="flex justify-between text-gray-500 text-xs mb-1 font-semibold">
                                                                <span>{user1Name}: {formatMoney(c[3])}</span>
                                                                <span>{user2Name}: {formatMoney(c[4])}</span>
                                                            </div>
                                                            {c[5] && String(c[5]) !== 'None' && (
                                                                <div className="mt-2 pt-2 border-t border-gray-200 space-y-1">
                                                                    {String(c[5]).split(' | ').map((ov, j) => {
                                                                        const isMatch = searchQuery.trim() && ov.toLowerCase().includes(searchQuery.toLowerCase());
                                                                        return (
                                                                            <div key={j} className={`text-[11px] flex items-start gap-1 ${isMatch ? 'text-teal-700 font-bold bg-teal-50 p-1 rounded' : 'text-gray-500'}`}>
                                                                                <i className={`fa-solid fa-thumbtack text-[8px] mt-[3px] ${isMatch ? 'text-teal-500' : 'text-gray-400'}`}></i> {formatOverrideString(ov)}
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="text-center py-6 text-gray-400 text-sm">No matching expenses found.</div>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="text-center py-10 text-gray-400">
                                            <i className="fa-solid fa-inbox text-3xl mb-2 opacity-50"></i>
                                            <p>No data found for this month.</p>
                                        </div>
                                    )}
