                                </div>
                                
                                {historyMonthData && (
                                    <div className="p-4 border-t bg-white">
                                        <button onClick={() => handleShare('history', historyMonthData)} className="w-full bg-[#25D366] text-white p-3 rounded-xl font-bold flex justify-center items-center gap-2 hover:bg-[#128C7E] shadow-md transition-colors">
                                            <i className="fa-brands fa-whatsapp text-xl"></i> Share {historyMonthData.month}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {view === 'dashboard' && chartData.length > 0 && !showHistory && (
                        <div className="fixed bottom-20 right-4 z-40">
                            {shareModalOpen && (
                                <div className="absolute bottom-16 right-0 bg-white border shadow-xl rounded-xl p-2 w-56 space-y-1 transform transition-all">
                                    <button onClick={() => handleShare('insights')} className="w-full text-left px-3 py-3 text-sm hover:bg-teal-50 rounded-lg font-bold text-teal-700 flex items-center gap-2 border-b">
                                        <i className="fa-brands fa-whatsapp text-lg opacity-80 text-green-500"></i> Share {timeframe} Data
                                    </button>
                                    <button onClick={() => handleCopy('insights')} className="w-full text-left px-3 py-3 text-sm hover:bg-teal-50 rounded-lg font-bold text-teal-700 flex items-center gap-2">
                                        <i className="fa-regular fa-copy text-lg opacity-80 text-gray-500"></i> Copy to Clipboard
                                    </button>
                                </div>
                            )}
                            <button onClick={() => setShareModalOpen(!shareModalOpen)} className="bg-green-500 hover:bg-green-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl transition-transform hover:scale-105">
                                {shareModalOpen ? <i className="fa-solid fa-xmark"></i> : <i className="fa-solid fa-share-nodes"></i>}
                            </button>
                        </div>
                    )}

                    <nav className="fixed bottom-0 w-full max-w-md bg-white border-t flex justify-around p-3 pb-safe z-30 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
                        <button onClick={() => {setView('entry'); setShowHistory(false);}} className={`flex flex-col items-center flex-1 transition-colors ${view === 'entry' ? 'text-teal-700' : 'text-gray-400 hover:text-gray-600'}`}>
                            <i className="fa-solid fa-keyboard text-xl mb-1"></i>
                            <span className="text-[10px] font-bold tracking-wide uppercase mt-1">Entry</span>
                        </button>
                        <button onClick={() => {setView('dashboard'); setShowHistory(false);}} className={`flex flex-col items-center flex-1 transition-colors ${view === 'dashboard' ? 'text-teal-700' : 'text-gray-400 hover:text-gray-600'}`}>
                            <div className={`rounded-full w-12 h-12 flex items-center justify-center -mt-6 border-4 border-white shadow-md transition-colors ${view === 'dashboard' ? 'bg-teal-700 text-white' : 'bg-gray-200 text-gray-500'}`}>
                                <i className="fa-solid fa-chart-pie text-xl"></i>
                            </div>
                            <span className="text-[10px] font-bold tracking-wide uppercase mt-1">Dashboard</span>
                        </button>
                    </nav>
                </div>
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-6 bg-red-50 text-red-800 min-h-screen font-sans">
                            <h1 className="text-xl font-bold mb-4 border-b border-red-200 pb-2"><i className="fa-solid fa-triangle-exclamation mr-2"></i>App Crashed</h1>
                            <p className="text-sm font-bold mb-2">Error Details:</p>
                            <div className="text-xs bg-white p-3 rounded border border-red-200 break-words text-red-600 shadow-sm">
                                {this.state.error?.toString()}
                            </div>
                            <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="mt-6 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg shadow font-bold flex items-center gap-2"><i className="fa-solid fa-rotate-right"></i> Reset App & Reload</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
