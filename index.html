<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillSplit Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f9fafb;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes springUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .spring-up { animation: springUp 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes slideSheetUp {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }
        .sheet-up { animation: slideSheetUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        :root {
            --tooltip-bg: rgba(255, 255, 255, 0.95);
            --tooltip-text: #1f2937;
            --tooltip-border: rgba(200, 200, 200, 0.2);
            --surface-tonal: #ffffff;
        }

        /* AMOLED Dark Mode Overhaul */
        @media (prefers-color-scheme: dark) {
            body { background-color: #000000 !important; }
            .bg-gray-50, .bg-gray-100 { background-color: #000000 !important; }
            .bg-white { background-color: #0a0a0a !important; }
            
            .text-gray-800, .text-gray-700, .text-gray-900 { color: #e3e3e3 !important; }
            .text-gray-600, .text-gray-500 { color: #a0a0a0 !important; }
            .text-gray-400 { color: #737373 !important; }
            
            .border, .border-gray-200, .border-gray-100, .border-b, .border-t, .border-l-2, .border-l-4 { border-color: rgba(255,255,255,0.05) !important; }
            input, select { background-color: #1a1a1a !important; color: #ffffff !important; border-color: transparent !important; color-scheme: dark; }
            input:disabled, select:disabled { background-color: transparent !important; opacity: 1 !important; color: #a0a0a0 !important; -webkit-text-fill-color: #a0a0a0; }
            
            .bg-teal-50 { background-color: rgba(20, 83, 73, 0.15) !important; border-color: rgba(20, 83, 73, 0.3) !important; }
            .text-teal-800, .text-teal-700, .text-teal-600 { color: #5eead4 !important; }
            .bg-teal-800, .bg-teal-700 { background-color: #0f766e !important; color: #fff !important; }
            
            .bg-blue-50 { background-color: rgba(30, 58, 138, 0.15) !important; border-color: rgba(30, 58, 138, 0.3) !important; }
            .text-blue-800, .text-blue-700, .text-blue-500 { color: #93c5fd !important; }
            
            .bg-purple-50 { background-color: rgba(88, 28, 135, 0.15) !important; border-color: rgba(88, 28, 135, 0.3) !important; }
            .text-purple-800, .text-purple-700, .text-purple-500 { color: #d8b4fe !important; }
            
            .bg-amber-50, .bg-amber-300 { background-color: rgba(120, 53, 15, 0.2) !important; border-color: rgba(120, 53, 15, 0.3) !important; }
            .text-amber-900, .text-amber-800, .text-amber-700 { color: #fde68a !important; }
            
            header, .absolute.bottom-16.right-0.bg-white, nav { background-color: rgba(10, 10, 10, 0.85) !important; border-color: rgba(255,255,255,0.05) !important; }
            
            .recharts-cartesian-grid-horizontal line { stroke: rgba(255,255,255,0.05) !important; }
            .recharts-text { fill: #a0a0a0 !important; }
            
            :root {
                --tooltip-bg: rgba(10, 10, 10, 0.95);
                --tooltip-text: #e3e3e3;
                --tooltip-border: rgba(255, 255, 255, 0.1);
                --surface-tonal: #0a0a0a;
            }
            .recharts-tooltip-item { color: #e3e3e3 !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { LineChart, Line, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts;

        const DEFAULT_OFFLINE_SPENDS = ['Home Loan EMI', 'Monthly Rent', 'Society Maintenance', 'Cook Salary', 'Cleaning Maid Salary', 'Nanny Salary', 'Grocery', 'Car Wash', 'Electricity Bill', 'Broadband Bill'];
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

        const OBFUSCATED_URL = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J3N20wazI3b0NfQkozRnZaNkotUGUtWE1pV3hwX2tlVXJWRnNZVl9oeUNwdGx1dFVlVTFmVFRlbzVTdG1uZXF0UWUvZXhlYw==";

        // Global Utility Functions
        const toYYYYMM = (dateVal) => {
            if (!dateVal) return '';
            const s = String(dateVal);
            if (s.includes('T')) {
                const d = new Date(s);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            }
            const parts = s.split('-');
            if (parts.length >= 2) return `${parts[0]}-${parts[1].padStart(2, '0')}`;
            return s.substring(0, 7); 
        };

        const formatMoney = (amount) => {
            const num = parseFloat(amount);
            if (isNaN(num)) return '---';
            const hasDecimal = num % 1 !== 0;
            return `₹ ${num.toLocaleString('en-IN', { minimumFractionDigits: hasDecimal ? 2 : 0, maximumFractionDigits: hasDecimal ? 2 : 0 })}`;
        };

        const formatMonthName = (dateStr) => {
            if (!dateStr) return '';
            try {
                const clean = toYYYYMM(dateStr);
                const parts = clean.split('-');
                if (parts.length >= 2) return `${new Date(parts[0], parts[1] - 1).toLocaleDateString('en-US', { month: 'short' })}'${parts[0].slice(-2)}`;
                return dateStr;
            } catch (e) { return dateStr; }
        };

        const formatInputMoney = (val) => {
            if (val === null || val === undefined || val === '') return '';
            const clean = String(val).replace(/,/g, '');
            if (isNaN(clean) || clean === '') return val;
            const parts = clean.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            return parts.join('.');
        };

        const parseInputMoney = (val) => {
            if (!val) return '';
            const clean = String(val).replace(/,/g, '');
            if (clean.endsWith('.')) return clean;
            return isNaN(clean) ? '' : clean;
        };

        const formatOverrideString = (ovStr) => {
            if (!ovStr) return '';
            const match = ovStr.match(/(.*)\s-\s₹([\d.,]+)\s\((.*)\)/);
            if (match) return `${match[1].trim()} - ${formatMoney(match[2].replace(/,/g,''))} (${match[3].trim()})`;
            return ovStr;
        };

        const getCardStyle = (name) => {
            const n = (name || '').toLowerCase();
            let bg = 'linear-gradient(135deg, #171717 0%, #0a0a0a 100%)';
            let border = 'rgba(255,255,255,0.1)';
            
            // Recreated issuing bank color profiles for actual-card feel
            if(n.includes('regalia') || n.includes('gold')) { bg = 'linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%)'; border = 'rgba(212, 175, 55, 0.4)'; }
            else if(n.includes('swiggy')) { bg = 'linear-gradient(135deg, #000000 0%, #431407 100%)'; border = 'rgba(249, 115, 22, 0.4)'; }
            else if(n.includes('sbi')) { bg = 'linear-gradient(135deg, #083344 0%, #064e3b 100%)'; border = 'rgba(20, 184, 166, 0.4)'; }
            else if(n.includes('tata') || n.includes('neu')) { bg = 'linear-gradient(135deg, #2e1065 0%, #000000 100%)'; border = 'rgba(168, 85, 247, 0.4)'; }
            else if(n.includes('amazon') || n.includes('icici')) { bg = 'linear-gradient(135deg, #271c19 0%, #000000 100%)'; border = 'rgba(245, 158, 11, 0.4)'; }
            else if(n.includes('axis')) { bg = 'linear-gradient(135deg, #450a0a 0%, #000000 100%)'; border = 'rgba(220, 38, 38, 0.4)'; }

            return { 
                background: bg,
                borderColor: border
            };
        };

        // Extracted Component
        const GraphicCard = ({ cName, cTotal, u1Share, u2Share, overrides, isEdit, isEditMode, handleTotalChange, updateOverride, removeOverride, addOverride, user1Name, user2Name }) => {
            const [isExpanded, setIsExpanded] = useState(true);

            return (
                <div style={getCardStyle(cName)} className="rounded-[32px] shadow-lg relative text-white mb-4 transition-all hover:shadow-xl group overflow-hidden border">
                    <div className="absolute inset-0 bg-black/40 backdrop-blur-lg z-0"></div>
                    
                    <div className="absolute top-5 right-5 opacity-40 z-0">
                        <svg width="32" height="24" viewBox="0 0 32 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 0H28C30.2091 0 32 1.79086 32 4V20C32 22.2091 30.2091 24 28 24H4C1.79086 24 0 22.2091 0 20V4C0 1.79086 1.79086 0 4 0Z" fill="currentColor"/>
                            <path d="M10 0V24M22 0V24M0 8H32M0 16H32" stroke="#000" strokeWidth="2" strokeOpacity="0.2"/>
                        </svg>
                    </div>

                    <div className="p-5 relative z-10 flex justify-between items-center cursor-pointer select-none" onClick={() => !isEdit && setIsExpanded(!isExpanded)}>
                        <span className="font-black text-lg text-white drop-shadow-md tracking-tight flex items-center gap-3">
                            {!isEdit && <i className={`fa-solid fa-chevron-${isExpanded ? 'up' : 'down'} text-[10px] bg-white/10 w-6 h-6 flex items-center justify-center rounded-full transition-transform`}></i>}
                            {cName}
                        </span>
                        {isEdit ? (
                            <input type="text" inputMode="decimal" disabled={!isEditMode} placeholder="₹ 0.00" value={formatInputMoney(cTotal)} onChange={e => handleTotalChange(cName, parseInputMoney(e.target.value))} onClick={e => e.stopPropagation()} className="w-1/3 border-none bg-white/10 backdrop-blur-md py-2 px-3 rounded-2xl text-right font-black text-lg text-white placeholder-white/30 outline-none focus:ring-2 focus:ring-white/50 transition-all disabled:bg-transparent" />
                        ) : (
                            <span className="font-black text-xl text-white drop-shadow-md">{formatMoney(cTotal)}</span>
                        )}
                    </div>
                    
                    <div className={`transition-all duration-300 ease-in-out origin-top overflow-hidden ${isExpanded ? 'max-h-[1200px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-black/50 p-5 rounded-[28px] relative z-10 border-t border-white/10 m-1 mt-0">
                            <div className="flex justify-between text-[10px] font-black uppercase tracking-widest text-gray-400 mb-4 px-1">
                                <span>{user1Name}: {isEdit ? 'Auto' : formatMoney(u1Share)}</span>
                                <span>{user2Name}: {isEdit ? 'Auto' : formatMoney(u2Share)}</span>
                            </div>
                            <div className="space-y-3">
                                {isEdit ? overrides.map(ov => (
                                    <div key={ov.id} className="flex gap-2 relative bg-white/5 p-2 rounded-2xl border border-white/5">
                                        {isEditMode && <button onClick={() => removeOverride(cName, ov.id)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center shadow-md active:scale-90 z-20"><i className="fa-solid fa-xmark text-[10px]"></i></button>}
                                        <input type="text" disabled={!isEditMode} placeholder="Desc" value={ov.desc} onChange={e => updateOverride(cName, ov.id, 'desc', e.target.value)} className="w-2/5 text-xs p-2 rounded-xl border-none bg-white/10 text-white placeholder-white/40 outline-none disabled:bg-transparent" />
                                        <input type="text" inputMode="decimal" disabled={!isEditMode} placeholder="₹" value={formatInputMoney(ov.amount)} onChange={e => updateOverride(cName, ov.id, 'amount', parseInputMoney(e.target.value))} className="w-1/4 text-xs p-2 rounded-xl border-none bg-white/10 text-white placeholder-white/40 font-bold outline-none disabled:bg-transparent" />
                                        <select disabled={!isEditMode} value={ov.owner} onChange={e => updateOverride(cName, ov.id, 'owner', e.target.value)} className="w-1/3 text-[10px] p-2 rounded-xl border-none bg-white/10 text-white font-bold outline-none disabled:bg-transparent disabled:appearance-none">
                                            <option className="text-black" value={user1Name}>{user1Name}</option>
                                            <option className="text-black" value={user2Name}>{user2Name}</option>
                                        </select>
                                    </div>
                                )) : overrides.map((ov, j) => (
                                    <div key={j} className="text-xs flex items-center gap-2 text-gray-300 font-medium px-1">
                                        <div className="w-1.5 h-1.5 rounded-full bg-white/30"></div>
                                        {typeof ov === 'string' ? formatOverrideString(ov) : `${ov.desc} - ${formatMoney(ov.amount)} (${ov.owner})`}
                                    </div>
                                ))}
                                {isEditMode && (
                                    <button onClick={() => addOverride(cName)} className="text-xs text-white/80 font-bold flex items-center gap-2 hover:text-white active:scale-[0.97] p-2 bg-white/5 rounded-xl mt-2 w-full justify-center">
                                        <i className="fa-solid fa-plus"></i> Add Override
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const scriptUrl = useMemo(() => {
                try { return atob(OBFUSCATED_URL); } 
                catch { return ""; }
            }, []);

            const [view, setView] = useState('dashboard'); 
            const [isSyncing, setIsSyncing] = useState(false);
            const [isLoadingInitial, setIsLoadingInitial] = useState(false);
            const [fetchedSummary, setFetchedSummary] = useState([]);
            const [fetchedCards, setFetchedCards] = useState([]);
            const [activeBorrows, setActiveBorrows] = useState([]);
            
            const [shareModalOpen, setShareModalOpen] = useState(false);
            const [expandedUser, setExpandedUser] = useState(null);
            const [popupData, setPopupData] = useState(null);
            const [snapshotPayload, setSnapshotPayload] = useState(null);
            
            const [historyHubOpen, setHistoryHubOpen] = useState(false);
            const [isNavVisible, setIsNavVisible] = useState(true);
            const [showHistory, setShowHistory] = useState(false);
            const [borrowLedgerModalOpen, setBorrowLedgerModalOpen] = useState(false);
            
            const [shareSelectedBorrow, setShareSelectedBorrow] = useState(null);
            const [expandedBorrow, setExpandedBorrow] = useState(null);

            const [chartOrder, setChartOrder] = useState(() => {
                try { const saved = localStorage.getItem('bs_chart_order'); return saved ? JSON.parse(saved) : ['trend', 'pie', 'bar']; } 
                catch { return ['trend', 'pie', 'bar']; }
            });
            const [minimizedCharts, setMinimizedCharts] = useState(() => {
                try { const saved = localStorage.getItem('bs_minimized_charts'); return saved ? JSON.parse(saved) : {}; } 
                catch { return {}; }
            });

            const user1Name = 'Amit';
            const user2Name = 'Alka';
            
            const [selectedMonth, setSelectedMonth] = useState('');
            const [isEditMode, setIsEditMode] = useState(false);
            const [isReviewingDraft, setIsReviewingDraft] = useState(false);
            const [isWideTimeline, setIsWideTimeline] = useState(false);

            const [cardList, setCardList] = useState([]);
            const [newCardName, setNewCardName] = useState('');
            const [isAddingCard, setIsAddingCard] = useState(false);
            
            const [formData, setFormData] = useState({});
            const initOfflineSpends = () => DEFAULT_OFFLINE_SPENDS.map(desc => ({ id: generateId(), desc, amount: '', owner: 'Auto', isCustom: false }));
            const [offlineSpends, setOfflineSpends] = useState(initOfflineSpends());
            
            const [newBorrows, setNewBorrows] = useState([]);
            const [repayments, setRepayments] = useState({});

            const [historyMonth, setHistoryMonth] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [timeframe, setTimeframe] = useState('Rolling 12');
            const [isVarianceExpanded, setIsVarianceExpanded] = useState(false);

            const rules = useMemo(() => ({
                cards: { 'HDFC Swiggy': user2Name, 'Axis Airtel': user1Name },
                categories: {
                    'Cook Salary': user1Name, 'Cleaning Maid Salary': user1Name, 'Nanny Salary': user1Name, 'Car Wash': user1Name,
                    'Electricity Bill': user1Name, 'Broadband Bill': user1Name, 'Monthly Rent': 'Split',
                    'Society Maintenance': 'Split', 'Home Loan EMI': 'Split', 'Grocery': 'Split'
                }
            }), [user1Name, user2Name]);

            useEffect(() => {
                let lastScrollY = window.scrollY;
                const handleScroll = () => {
                    const currentScrollY = window.scrollY;
                    if (currentScrollY > lastScrollY && currentScrollY > 50) setIsNavVisible(false);
                    else setIsNavVisible(true);
                    lastScrollY = currentScrollY;
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                if (historyHubOpen || showHistory || borrowLedgerModalOpen || popupData || shareModalOpen) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = 'auto';
                }
                return () => { document.body.style.overflow = 'auto'; }
            }, [historyHubOpen, showHistory, borrowLedgerModalOpen, popupData, shareModalOpen]);

            useEffect(() => { localStorage.setItem('bs_chart_order', JSON.stringify(chartOrder)); }, [chartOrder]);
            useEffect(() => { localStorage.setItem('bs_minimized_charts', JSON.stringify(minimizedCharts)); }, [minimizedCharts]);

            useEffect(() => { if (scriptUrl) fetchAllData(); }, [scriptUrl]);

            useEffect(() => {
                if (fetchedSummary && fetchedSummary.length > 0 && !historyMonth) {
                    const allMonths = fetchedSummary.filter(s => s && s[0]).map(s => toYYYYMM(s[0])).sort();
                    if (allMonths.length > 0) setHistoryMonth(allMonths[allMonths.length - 1]);
                }
            }, [fetchedSummary, historyMonth]);

            const sortedCardList = useMemo(() => {
                if (!cardList.length) return [];
                if (!fetchedCards.length) return cardList;
                const sortedMonths = [...new Set(fetchedCards.filter(c => c && c[0]).map(c => toYYYYMM(c[0])))].sort().slice(-6);
                const recentCards = fetchedCards.filter(c => c && c[0] && sortedMonths.includes(toYYYYMM(c[0])));
                const counts = {};
                cardList.forEach(c => counts[c] = 0);
                recentCards.forEach(c => { if (c[1] && counts[c[1]] !== undefined && parseFloat(c[2]) > 0) counts[c[1]]++; });
                return [...cardList].sort((a, b) => counts[b] - counts[a]);
            }, [cardList, fetchedCards]);

            const parseDeductionsLog = (logStr) => {
                if (!logStr || String(logStr) === 'None') return [];
                return String(logStr).split(' | ').map(item => {
                    const match = item.match(/(.*)\s-\s₹([\d.,]+)\s\((.*)\)/);
                    if (match) return { desc: match[1].trim(), amount: parseFloat(match[2].replace(/,/g,'')), owner: match[3].trim() };
                    return null;
                }).filter(Boolean);
            };

            useEffect(() => {
                if (!selectedMonth) return;
                const monthCards = fetchedCards.filter(c => c && c[0] && toYYYYMM(c[0]) === selectedMonth);
                
                setFormData(prev => {
                    const updated = {};
                    sortedCardList.forEach(c => { updated[c] = { total: '', overrides: [] }; });
                    if (monthCards.length > 0) {
                        monthCards.forEach(c => {
                            const cardName = c[1];
                            if (sortedCardList.includes(cardName)) {
                                const overrides = parseDeductionsLog(c[5]).map(ov => ({ id: generateId(), desc: ov.desc, amount: ov.amount, owner: ov.owner }));
                                updated[cardName] = { total: parseFloat(c[2]) || '', overrides };
                            }
                        });
                    }
                    return updated;
                });

                if (monthCards.length > 0) {
                    let newOffline = [];
                    let newReps = {};
                    monthCards.forEach(c => {
                        if (c[1] === 'Offline & Fixed Spends') newOffline = parseDeductionsLog(c[5]).map(ov => ({ id: generateId(), desc: ov.desc, amount: ov.amount, owner: ov.owner, isCustom: !DEFAULT_OFFLINE_SPENDS.includes(ov.desc) }));
                        if (c[1] === 'Settle Borrow') {
                            parseDeductionsLog(c[5]).forEach(rep => {
                                const activeB = activeBorrows.find(b => b.desc === rep.desc);
                                if (activeB) newReps[activeB.id] = { active: true, amount: rep.amount };
                            });
                        }
                    });
                    if (newOffline.length === 0) newOffline = initOfflineSpends();
                    setOfflineSpends(newOffline);
                    setRepayments(newReps);
                    setIsEditMode(false); 
                } else {
                    setOfflineSpends(initOfflineSpends());
                    setRepayments({});
                    setIsEditMode(true); 
                }
                setNewBorrows([]);
                setIsReviewingDraft(false);
            }, [selectedMonth, sortedCardList, fetchedCards, activeBorrows]);

            const fetchAllData = async () => {
                if (!scriptUrl.trim()) return;
                setIsLoadingInitial(true);
                try {
                    const response = await fetch(`${scriptUrl.trim()}?action=getAllData`);
                    const result = await response.json();
                    if (result.ok && result.data) {
                        setFetchedSummary(result.data.summary || []);
                        setFetchedCards(result.data.cards || []);
                        if (result.data.myCards && result.data.myCards.length > 0) setCardList(result.data.myCards);
                        if (result.data.activeBorrows) setActiveBorrows(result.data.activeBorrows);
                    }
                } catch (error) { console.error("Fetch error", error); } finally { setIsLoadingInitial(false); }
            };

            const handleAddCard = async () => {
                if (!newCardName.trim() || !scriptUrl) return;
                setIsAddingCard(true);
                try {
                    await fetch(scriptUrl.trim(), { method: 'POST', body: JSON.stringify({ action: 'addCard', cardName: newCardName.trim() }), mode: 'no-cors' });
                    setCardList(prev => [...prev, newCardName.trim()]);
                    setNewCardName('');
                    setTimeout(fetchAllData, 1000); 
                } catch (e) { alert('Failed to add card to sheet.'); } finally { setIsAddingCard(false); }
            };

            const handleTotalChange = (card, value) => setFormData(prev => ({ ...prev, [card]: { ...prev[card], total: value } }));
            const addOverride = (card) => setFormData(prev => ({ ...prev, [card]: { ...prev[card], overrides: [...prev[card].overrides, { id: generateId(), desc: '', amount: '', owner: user1Name }] } }));
            const updateOverride = (card, id, field, value) => setFormData(prev => ({ ...prev, [card]: { ...prev[card], overrides: prev[card].overrides.map(ov => ov.id === id ? { ...ov, [field]: value } : ov) } }));
            const removeOverride = (card, id) => setFormData(prev => ({ ...prev, [card]: { ...prev[card], overrides: prev[card].overrides.filter(ov => ov.id !== id) } }));
            
            const handleOfflineChange = (id, field, value) => setOfflineSpends(prev => prev.map(exp => exp.id === id ? { ...exp, [field]: value } : exp));
            const addCustomOfflineSpend = () => setOfflineSpends(prev => [...prev, { id: generateId(), desc: '', amount: '', owner: 'Split', isCustom: true }]);
            const removeOfflineSpend = (id) => setOfflineSpends(prev => prev.filter(exp => exp.id !== id));
            
            const handleNewBorrowChange = (id, field, value) => setNewBorrows(prev => prev.map(b => b.id === id ? { ...b, [field]: value } : b));
            const addNewBorrow = () => setNewBorrows(prev => [...prev, { id: generateId(), desc: '', amount: '', borrower: user1Name }]);
            const removeNewBorrow = (id) => setNewBorrows(prev => prev.filter(b => b.id !== id));

            const toggleRepayment = (id) => setRepayments(prev => ({...prev, [id]: { active: !prev[id]?.active, amount: prev[id]?.amount || '' }}));
            const handleRepaymentChange = (id, value, max) => {
                let val = parseFloat(value);
                if (val > max) val = max; 
                if (val < 0) val = 0;
                setRepayments(prev => ({...prev, [id]: { ...prev[id], amount: isNaN(val) ? '' : val }}));
            };

            const resetForm = () => {
                if (window.confirm("Are you sure you want to clear all entered data?")) {
                    const reset = {};
                    sortedCardList.forEach(c => reset[c] = { total: '', overrides: [] });
                    setFormData(reset);
                    setOfflineSpends(initOfflineSpends());
                    setNewBorrows([]);
                    setRepayments({});
                }
            };

            const moveChart = (index, direction) => {
                const newOrder = [...chartOrder];
                if (direction === 'up' && index > 0) [newOrder[index - 1], newOrder[index]] = [newOrder[index], newOrder[index - 1]];
                else if (direction === 'down' && index < newOrder.length - 1) [newOrder[index + 1], newOrder[index]] = [newOrder[index], newOrder[index + 1]];
                setChartOrder(newOrder);
            };

            const handleDragStart = (e, id) => { e.dataTransfer.setData("text/plain", id); e.dataTransfer.effectAllowed = "move"; };
            const handleDrop = (e, targetId) => {
                e.preventDefault();
                const draggedId = e.dataTransfer.getData("text");
                if (draggedId && draggedId !== targetId) {
                    const newOrder = [...chartOrder];
                    newOrder.splice(newOrder.indexOf(draggedId), 1);
                    newOrder.splice(newOrder.indexOf(targetId), 0, draggedId);
                    setChartOrder(newOrder);
                }
            };

            const activeCardsData = useMemo(() => {
                const processed = [];
                let grandTotal = 0, u1Grand = 0, u2Grand = 0;

                sortedCardList.forEach(cardName => {
                    if (!formData[cardName]) return;
                    const data = formData[cardName];
                    const totalAmt = parseFloat(data.total);
                    if (!isNaN(totalAmt) && totalAmt > 0) {
                        let totalOverrides = 0, u1Share = 0, u2Share = 0;
                        const cleanOverrides = [];
                        data.overrides.forEach(ov => {
                            const amt = parseFloat(ov.amount);
                            if (!isNaN(amt) && amt > 0) {
                                totalOverrides += amt;
                                cleanOverrides.push({ ...ov, amount: amt });
                                if (ov.owner === user1Name) u1Share += amt;
                                if (ov.owner === user2Name) u2Share += amt;
                            }
                        });
                        const remaining = Math.max(0, totalAmt - totalOverrides);
                        const defaultOwner = rules.cards[cardName] || 'Split';
                        if (defaultOwner === user1Name) u1Share += remaining;
                        else if (defaultOwner === user2Name) u2Share += remaining;
                        else { u1Share += (remaining / 2); u2Share += (remaining / 2); }

                        processed.push({ cardName, total: totalAmt, u1Share, u2Share, overrides: cleanOverrides });
                        grandTotal += totalAmt; u1Grand += u1Share; u2Grand += u2Share;
                    }
                });

                let offlineTotal = 0, offU1 = 0, offU2 = 0;
                const cleanOfflineOverrides = [];

                offlineSpends.forEach(exp => {
                    const amt = parseFloat(exp.amount);
                    if (!isNaN(amt) && amt > 0 && exp.desc.trim() !== '') {
                        offlineTotal += amt;
                        let finalOwner = exp.owner === 'Auto' ? (rules.categories[exp.desc] || 'Split') : exp.owner;
                        cleanOfflineOverrides.push({ desc: exp.desc, amount: amt, owner: finalOwner });

                        if (finalOwner === user1Name) offU1 += amt;
                        else if (finalOwner === user2Name) offU2 += amt;
                        else { offU1 += (amt / 2); offU2 += (amt / 2); }
                    }
                });

                if (offlineTotal > 0) {
                    processed.push({ cardName: 'Offline & Fixed Spends', total: offlineTotal, u1Share: offU1, u2Share: offU2, overrides: cleanOfflineOverrides });
                    grandTotal += offlineTotal; u1Grand += offU1; u2Grand += offU2;
                }

                let repaymentU1 = 0, repaymentU2 = 0;
                const cleanRepayments = [];

                Object.keys(repayments).forEach(id => {
                    const rep = repayments[id];
                    if (rep.active) {
                        const amt = parseFloat(rep.amount);
                        const borrowItem = activeBorrows.find(b => b.id === id);
                        if (!isNaN(amt) && amt > 0 && borrowItem) {
                            cleanRepayments.push({ desc: `${borrowItem.desc}`, amount: amt, owner: `Repayment from ${borrowItem.borrower}` });
                            if (borrowItem.borrower === user1Name) { repaymentU1 += amt; repaymentU2 -= amt; } 
                            else if (borrowItem.borrower === user2Name) { repaymentU2 += amt; repaymentU1 -= amt; }
                        }
                    }
                });

                if (cleanRepayments.length > 0) {
                    processed.push({ cardName: 'Settle Borrow', total: 0, u1Share: repaymentU1, u2Share: repaymentU2, overrides: cleanRepayments });
                    u1Grand += repaymentU1; u2Grand += repaymentU2;
                }

                return { cards: processed, summary: { total: grandTotal, u1Total: u1Grand, u2Total: u2Grand } };
            }, [formData, offlineSpends, activeBorrows, repayments, rules, user1Name, user2Name, sortedCardList]);

            const activeBorrowsToSubmit = useMemo(() => newBorrows.filter(b => parseFloat(b.amount) > 0 && b.desc.trim() !== ''), [newBorrows]);
            const activeFilteredBorrows = useMemo(() => activeBorrows.filter(b => b.remainingAmount > 0), [activeBorrows]);
            const settledArchiveBorrows = useMemo(() => activeBorrows.filter(b => b.remainingAmount <= 0), [activeBorrows]);
            const hasDraftData = isEditMode && (activeCardsData.cards.length > 0 || activeBorrowsToSubmit.length > 0);

            const syncToSheets = async () => {
                if (!scriptUrl.trim()) return alert('Please set your Apps Script URL in settings or ensure obfuscation is correct.');
                if (!hasDraftData) return alert('No data to sync.');
                setIsSyncing(true);
                const activeRepsToSync = Object.keys(repayments).filter(id => repayments[id].active && parseFloat(repayments[id].amount) > 0).map(id => ({ id, amount: parseFloat(repayments[id].amount) }));
                const payload = { action: 'syncMonth', month: selectedMonth, summary: activeCardsData.summary, cards: activeCardsData.cards, newBorrows: activeBorrowsToSubmit, repayments: activeRepsToSync };
                try {
                    await fetch(scriptUrl.trim(), { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
                    alert(`Successfully synced ${selectedMonth} to Sheets!`);
                    setIsEditMode(false);
                    setIsReviewingDraft(false);
                    setTimeout(fetchAllData, 1000);
                } catch (error) { alert('Error syncing to Sheet. Check network connection.'); } finally { setIsSyncing(false); }
            };

            const consolidateCards = (cardsArray) => {
                const map = {};
                cardsArray.forEach(c => {
                    if (!c || !c[0] || !c[1]) return;
                    const key = c[1]; 
                    if(!map[key]) map[key] = { month: toYYYYMM(c[0]), name: c[1], total: 0, u1: 0, u2: 0, overrides: [] };
                    map[key].total += parseFloat(c[2]) || 0;
                    map[key].u1 += parseFloat(c[3]) || 0;
                    map[key].u2 += parseFloat(c[4]) || 0;
                    if (c[5] && String(c[5]) !== 'None') map[key].overrides.push(...String(c[5]).split(' | '));
                });
                return Object.values(map).map(c => [c.month, c.name, c.total, c.u1, c.u2, c.overrides.length > 0 ? c.overrides.join(' | ') : 'None']);
            };

            const { chartData, pieData, lastMonthData } = useMemo(() => {
                if (!fetchedSummary || fetchedSummary.length === 0) return { chartData: [], pieData: [], lastMonthData: null };
                const aggSum = {};
                fetchedSummary.forEach(row => {
                    if (!row || !row[0]) return;
                    const m = toYYYYMM(row[0]);
                    if (!aggSum[m]) aggSum[m] = { month: m, total: 0, u1: 0, u2: 0 };
                    aggSum[m].total += parseFloat(row[1]) || 0;
                    aggSum[m].u1 += parseFloat(row[2]) || 0;
                    aggSum[m].u2 += parseFloat(row[3]) || 0;
                });
                let sortedAggSum = Object.values(aggSum).sort((a, b) => a.month.localeCompare(b.month));
                if (sortedAggSum.length === 0) return { chartData: [], pieData: [], lastMonthData: null };

                let filteredSummary = sortedAggSum;
                const currentYear = new Date().getFullYear();
                if (timeframe === 'Rolling 12') filteredSummary = sortedAggSum.slice(-12);
                else if (timeframe === 'CY') filteredSummary = sortedAggSum.filter(r => r.month.startsWith(currentYear.toString()));
                else if (timeframe === 'FY') {
                    const currentMonth = new Date().getMonth() + 1;
                    const startYear = currentMonth >= 4 ? currentYear : currentYear - 1;
                    filteredSummary = sortedAggSum.filter(r => r.month >= `${startYear}-04` && r.month <= `${startYear + 1}-03`);
                }

                let totalU1AllTime = 0, totalU2AllTime = 0;
                const cData = filteredSummary.map(row => {
                    const month = row.month, totalSpend = row.total;
                    totalU1AllTime += row.u1; totalU2AllTime += row.u2;

                    let monthCards = consolidateCards(fetchedCards.filter(c => c && c[0] && toYYYYMM(c[0]) === month));
                    let oneOffAmount = 0, hhTotal = 0, dedU1 = 0, dedU2 = 0, adhocU1List = [], adhocU2List = [];

                    monthCards.forEach(c => {
                        const cardName = c[1], cardTotal = parseFloat(c[2]) || 0;
                        if (cardName === 'Offline & Fixed Spends' || cardName === 'HDFC Swiggy') hhTotal += cardTotal;
                        else if (cardName !== 'Settle Borrow') {
                            parseDeductionsLog(c[5]).forEach(d => {
                                if (d && d.desc && d.owner) {
                                    if (DEFAULT_OFFLINE_SPENDS.some(def => d.desc.toLowerCase().includes(def.toLowerCase()))) hhTotal += d.amount;
                                    else {
                                        oneOffAmount += d.amount;
                                        if (d.owner.includes(user1Name)) { dedU1 += d.amount; adhocU1List.push({ desc: d.desc, amount: d.amount, card: cardName }); }
                                        if (d.owner.includes(user2Name)) { dedU2 += d.amount; adhocU2List.push({ desc: d.desc, amount: d.amount, card: cardName }); }
                                    }
                                }
                            });
                        }
                    });

                    return { name: formatMonthName(month), Total: totalSpend, Household: hhTotal, 'Ad-hoc': oneOffAmount, 'Credit Card': Math.max(0, (totalSpend - oneOffAmount) - hhTotal), [user1Name]: dedU1, [user2Name]: dedU2, rawMonthCards: monthCards, adhocU1List, adhocU2List };
                });

                const pData = [{ name: user1Name, value: totalU1AllTime }, { name: user2Name, value: totalU2AllTime }];
                const lastAggSum = sortedAggSum[sortedAggSum.length - 1];
                let cardsForLastMonth = consolidateCards(fetchedCards.filter(c => c && c[0] && toYYYYMM(c[0]) === lastAggSum.month));

                return { chartData: cData, pieData: pData, lastMonthData: { month: formatMonthName(lastAggSum.month), total: lastAggSum.total, u1Total: lastAggSum.u1, u2Total: lastAggSum.u2, cards: cardsForLastMonth } };
            }, [fetchedSummary, fetchedCards, user1Name, user2Name, timeframe]);

            const uniqueMonths = useMemo(() => [...new Set(fetchedSummary.filter(s => s && s[0]).map(s => toYYYYMM(s[0])))].sort().reverse(), [fetchedSummary]);

            const historyMonthData = useMemo(() => {
                if (!historyMonth || !fetchedSummary || fetchedSummary.length === 0) return null;
                let total = 0, u1Total = 0, u2Total = 0;
                const monthRows = fetchedSummary.filter(r => r && r[0] && toYYYYMM(r[0]) === historyMonth);
                if (monthRows.length === 0) return null;

                monthRows.forEach(r => { total += parseFloat(r[1]) || 0; u1Total += parseFloat(r[2]) || 0; u2Total += parseFloat(r[3]) || 0; });
                let cardsForMonth = consolidateCards(fetchedCards.filter(c => c && c[0] && toYYYYMM(c[0]) === historyMonth));
                
                if (searchQuery.trim()) {
                    const lowerQ = searchQuery.toLowerCase();
                    cardsForMonth = cardsForMonth.filter(c => (c[1] || '').toLowerCase().includes(lowerQ) || (c[5] && String(c[5]).toLowerCase().includes(lowerQ)));
                }
                return { month: formatMonthName(historyMonth), total, u1Total, u2Total, cards: cardsForMonth };
            }, [historyMonth, fetchedSummary, fetchedCards, searchQuery]);

            const varianceData = useMemo(() => {
                if (!chartData || chartData.length < 2) return null;
                const curr = chartData[chartData.length - 1], prev = chartData[chartData.length - 2];

                const getItems = (monthCards) => {
                    const items = {};
                    (monthCards || []).forEach(c => {
                        const cName = c[1], cTotal = parseFloat(c[2]) || 0, ovs = c[5] && c[5] !== 'None' ? parseDeductionsLog(c[5]) : [];
                        let overrideSum = 0;
                        ovs.forEach(ov => { if (ov.amount > 0) { items[ov.desc] = (items[ov.desc] || 0) + ov.amount; overrideSum += ov.amount; } });
                        const cardBase = cTotal - overrideSum;
                        if (cardBase > 0 && cName !== 'Offline & Fixed Spends' && cName !== 'Settle Borrow') items[`${cName} (Base)`] = (items[`${cName} (Base)`] || 0) + cardBase;
                    });
                    return items;
                };

                const currItems = getItems(curr.rawMonthCards), prevItems = getItems(prev.rawMonthCards), deltas = [];
                new Set([...Object.keys(currItems), ...Object.keys(prevItems)]).forEach(key => {
                    const cVal = currItems[key] || 0, pVal = prevItems[key] || 0, diff = cVal - pVal;
                    if (Math.abs(diff) > 5) deltas.push({ desc: key, diff, isNew: pVal === 0, isRemoved: cVal === 0 });
                });
                deltas.sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));

                return { month: curr.name, prevMonth: prev.name, total: curr.Total - prev.Total, hh: curr.Household - prev.Household, cc: curr['Credit Card'] - prev['Credit Card'], adhoc: curr['Ad-hoc'] - prev['Ad-hoc'], topDrivers: deltas.slice(0, 6) };
            }, [chartData]);

            const extractShareData = (scope, customData = null) => {
                const sourceCards = customData !== null ? customData.cards : ((isEditMode && hasDraftData) ? activeCardsData.cards : (lastMonthData ? lastMonthData.cards : []));
                if (!sourceCards || sourceCards.length === 0) return null;

                let hhSpends = [], ccSpends = [], adhocSpends = [], loanSpends = [];
                let hhTotal = 0, ccTotal = 0, adhocTotal = 0, loanTotal = 0;

                sourceCards.forEach(c => {
                    const isArray = Array.isArray(c);
                    const cName = (isArray ? c[1] : c.cardName) || 'Unknown';
                    const cTotalAmt = parseFloat(isArray ? c[2] : c.total) || 0;
                    const u1S = isArray ? (parseFloat(c[3])||0) : (c.u1Share||0);
                    const u2S = isArray ? (parseFloat(c[4])||0) : (c.u2Share||0);
                    let overrides = isArray ? parseDeductionsLog(c[5]) : (c.overrides || []);

                    if (scope === 'All') {
                         if (cName === 'Offline & Fixed Spends') { overrides.forEach(ov => { hhSpends.push({desc: ov.desc, amount: parseFloat(ov.amount), owner: ov.owner}); hhTotal += parseFloat(ov.amount); }); } 
                         else if (cName === 'Settle Borrow') { overrides.forEach(ov => { loanSpends.push({desc: ov.desc, amount: parseFloat(ov.amount), owner: ov.owner}); loanTotal += parseFloat(ov.amount); }); } 
                         else { ccSpends.push({desc: cName, amount: cTotalAmt, u1: u1S, u2: u2S, overrides}); ccTotal += cTotalAmt; }
                    } else if (scope === 'Cards') {
                         if (cName !== 'Offline & Fixed Spends' && cName !== 'Settle Borrow') { ccSpends.push({desc: cName, amount: cTotalAmt, overrides}); ccTotal += cTotalAmt; }
                    } else if (scope === 'Household') {
                         overrides.forEach(ov => {
                             if (DEFAULT_OFFLINE_SPENDS.some(def => ov.desc.toLowerCase().includes(def.toLowerCase())) || cName === 'Offline & Fixed Spends') {
                                 hhSpends.push({desc: ov.desc, amount: parseFloat(ov.amount), owner: ov.owner}); hhTotal += parseFloat(ov.amount);
                             }
                         });
                    } else { 
                         const targetUser = scope === user1Name ? user1Name : user2Name;
                         const uShare = scope === user1Name ? u1S : u2S;
                         if (cName === 'Offline & Fixed Spends') {
                             overrides.forEach(ov => {
                                 let amt = ov.owner === targetUser ? parseFloat(ov.amount) : (ov.owner === 'Split' ? parseFloat(ov.amount)/2 : 0);
                                 if (amt > 0) { hhSpends.push({desc: ov.desc, amount: amt}); hhTotal += amt; }
                             });
                         } else if (cName !== 'Settle Borrow') {
                             let cardBase = parseFloat(uShare) || 0;
                             overrides.forEach(ov => {
                                 let amt = ov.owner === targetUser ? parseFloat(ov.amount) : (ov.owner === 'Split' ? parseFloat(ov.amount)/2 : 0);
                                 if (amt > 0) {
                                     if (DEFAULT_OFFLINE_SPENDS.some(def => ov.desc.toLowerCase().includes(def.toLowerCase()))) { hhSpends.push({desc: `${ov.desc} (${cName})`, amount: amt}); hhTotal += amt; } 
                                     else { adhocSpends.push({desc: `${ov.desc} (${cName})`, amount: amt}); adhocTotal += amt; }
                                     cardBase -= amt;
                                 }
                             });
                             if (cardBase > 0) { ccSpends.push({desc: cName, amount: cardBase}); ccTotal += cardBase; }
                         }
                    }
                });

                const mTotal = customData ? customData.total : ((isEditMode && hasDraftData) ? activeCardsData.summary.total : (lastMonthData ? lastMonthData.total : 0));
                const mU1 = customData ? customData.u1Total : ((isEditMode && hasDraftData) ? activeCardsData.summary.u1Total : (lastMonthData ? lastMonthData.u1Total : 0));
                const mU2 = customData ? customData.u2Total : ((isEditMode && hasDraftData) ? activeCardsData.summary.u2Total : (lastMonthData ? lastMonthData.u2Total : 0));
                const monthName = customData ? customData.month : (hasDraftData ? formatMonthName(selectedMonth) : "LATEST");

                return { scope, hhSpends, ccSpends, adhocSpends, loanSpends, hhTotal, ccTotal, adhocTotal, loanTotal, mTotal, mU1, mU2, monthName };
            };

            const handleTextShare = (scope, customData = null) => {
                const data = extractShareData(scope, customData);
                if (!data) return alert("No data available.");
                let text = ``;
                if (scope === user1Name || scope === user2Name) {
                    text += `📊 *${scope}'s Breakdown*\n💰 *TOTAL SPEND:* ${formatMoney(data.hhTotal + data.ccTotal + data.adhocTotal)}\n━━━━━━━━━━━━━━━━━━━━━\n\n`;
                    if(data.hhSpends.length > 0) { text += `*HOUSEHOLD SPENDS* ${formatMoney(data.hhTotal)}\n`; data.hhSpends.forEach(item => text += `  > ${item.desc}   ${formatMoney(item.amount)}\n`); }
                    if(data.ccSpends.length > 0) { text += `\n*CREDIT CARD SPENDS* ${formatMoney(data.ccTotal)}\n`; data.ccSpends.forEach(item => text += `  💳 ${item.desc}   ${formatMoney(item.amount)}\n`); }
                    if(data.adhocSpends.length > 0) { text += `\n*AD-HOC SPENDS* ${formatMoney(data.adhocTotal)}\n`; data.adhocSpends.forEach(item => text += `  🏷️ ${item.desc}   ${formatMoney(item.amount)}\n`); }
                } else if (scope === 'Cards') {
                    text += `💳 *Credit Card Spends*\n💰 *TOTAL SPEND:* ${formatMoney(data.ccTotal)}\n━━━━━━━━━━━━━━━━━━━━━\n\n`;
                    data.ccSpends.forEach(c => { text += `*${c.desc}* ${formatMoney(c.amount)}\n`; c.overrides.forEach(ov => text += `  > ${ov.desc} (${ov.owner})  ${formatMoney(ov.amount)}\n`); text += `\n`; });
                } else if (scope === 'Household') {
                    text += `🏠 *Household Baseline*\n💰 *TOTAL SPEND:* ${formatMoney(data.hhTotal)}\n━━━━━━━━━━━━━━━━━━━━━\n\n`;
                    data.hhSpends.forEach(item => { text += `  > ${item.desc}   ${formatMoney(item.amount)}\n`; });
                } else {
                    text += `📄 *${data.monthName.toUpperCase()} SUMMARY*\n💰 *TOTAL SPEND:* ${formatMoney(data.mTotal)}\n━━━━━━━━━━━━━━━━━━━━━\n\n🔵 *${user1Name}:* ${formatMoney(data.mU1)}\n🟣 *${user2Name}:* ${formatMoney(data.mU2)}\n\n`;
                    if (data.ccSpends.length > 0) { text += `━━━━━━━━━━━━━━━━━━━━━\n💳 *CREDIT CARDS*\n\n`; data.ccSpends.forEach(c => { text += `🔹 *${c.desc}* \n     ${formatMoney(c.amount)}\n     ↳ ${user1Name}: ${formatMoney(c.u1)} | ${user2Name}: ${formatMoney(c.u2)}\n`; c.overrides.forEach(ov => { text += `     📌 _${ov.desc} - ${formatMoney(ov.amount)} (${ov.owner})_\n`; }); text += `\n`; }); }
                    if (data.hhSpends.length > 0) { text += `━━━━━━━━━━━━━━━━━━━━━\n🏠 *FIXED & OFFLINE SPENDS*\n\n🔹 *Total Expenses* \n     ${formatMoney(data.hhTotal)}\n`; data.hhSpends.forEach(ov => { text += `     ▫️ _${ov.desc} - ${formatMoney(ov.amount)} (${ov.owner})_\n`; }); text += `\n`; }
                    if (data.loanSpends.length > 0) { text += `━━━━━━━━━━━━━━━━━━━━━\n🔄 *BORROW REPAYMENTS*\n\n`; data.loanSpends.forEach(ov => { text += `     ▫️ _${ov.desc} - ${formatMoney(ov.amount)} (${ov.owner})_\n`; }); text += `\n`; }
                }
                text += `\n✨ _Generated via BillSplit_`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text.trim())}`);
                setShareModalOpen(false);
            };

            const prepareSnapshot = (scope, customData = null) => {
                const data = extractShareData(scope, customData);
                if (!data) return alert("No data available.");
                setSnapshotPayload(data);
                setShareModalOpen(false);
            };

            useEffect(() => {
                if (snapshotPayload) {
                    setTimeout(() => {
                        const el = document.getElementById('offscreen-render');
                        if (el) {
                            window.html2canvas(el, { scale: 2, backgroundColor: null }).then(canvas => {
                                canvas.toBlob(blob => {
                                    const file = new File([blob], `${snapshotPayload.scope}-breakdown.png`, { type: 'image/png' });
                                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                                        navigator.share({ files: [file], title: 'BillSplit Snapshot' }).catch(console.error);
                                    } else {
                                        const a = document.createElement('a');
                                        a.href = URL.createObjectURL(blob);
                                        a.download = file.name;
                                        a.click();
                                    }
                                    setSnapshotPayload(null);
                                });
                            });
                        }
                    }, 300);
                }
            }, [snapshotPayload]);

            const CustomBarTooltip = ({ active, payload, label }) => {
                if (active && payload && payload.length) {
                    const sorted = [...payload].reverse();
                    return (
                        <div style={{ backgroundColor: 'var(--tooltip-bg)', color: 'var(--tooltip-text)', borderRadius: '16px', border: '1px solid var(--tooltip-border)', padding: '12px', boxShadow: '0 10px 30px -5px rgba(0,0,0,0.3)', backdropFilter: 'blur(12px)' }}>
                            <p className="font-bold mb-2 text-sm">{label}</p>
                            {sorted.map(entry => (
                                <p key={entry.dataKey} className="text-xs font-bold mb-1 flex justify-between gap-4">
                                    <span style={{color: entry.fill}}>{entry.dataKey}:</span>
                                    <span>{formatMoney(entry.value)}</span>
                                </p>
                            ))}
                        </div>
                    );
                }
                return null;
            }

            const handleChartClick = (type, data = null) => {
                let title = "", content = null;
                if (type === 'trend' || type === 'bar') {
                    const monthData = data?.activePayload?.[0]?.payload || chartData[chartData.length - 1];
                    if (!monthData) return;
                    if (type === 'trend') {
                        title = `${monthData.name} - Variance Analysis`;
                        const prev = chartData[chartData.findIndex(d => d.name === monthData.name) - 1];
                        const renderRow = (label, currVal, prevVal) => {
                            let diffSpan = null;
                            if (prevVal && prevVal > 0) {
                                const diff = currVal - prevVal, pct = (diff / prevVal) * 100, color = diff > 0 ? 'text-red-500' : 'text-green-500', icon = diff > 0 ? 'fa-arrow-up' : 'fa-arrow-down';
                                diffSpan = <span className={`text-[10px] ml-2 font-bold ${color}`}><i className={`fa-solid ${icon} text-[8px]`}></i> {Math.abs(pct).toFixed(1)}%</span>;
                            }
                            return <div className="flex justify-between text-gray-600 dark:text-gray-400 border-b border-gray-100 dark:border-[#333] pb-1.5 mb-1.5 last:border-0"><span><span className="text-gray-300 dark:text-gray-600 mr-1">↳</span> {label}</span> <div className="text-right"><span className="font-medium text-gray-800 dark:text-gray-200">{formatMoney(currVal)}</span>{diffSpan}</div></div>;
                        };
                        content = (
                            <div className="space-y-2 text-sm">
                                <p className="text-[10px] text-gray-500 mb-3 leading-tight border-b border-gray-100 pb-2">Month-over-Month (MoM) variance compared to the previous tracking period.</p>
                                <div className="flex justify-between border-b border-gray-200 dark:border-[#444] pb-2 mb-2"><span className="font-bold text-gray-800 dark:text-gray-200">Gross Total:</span> <div className="text-right"><span className="font-bold text-gray-800 dark:text-gray-200">{formatMoney(monthData.Total)}</span>{prev && prev.Total > 0 && (() => { const diff = monthData.Total - prev.Total; return <span className={`text-[10px] ml-2 font-bold ${diff > 0 ? 'text-red-500' : 'text-green-500'}`}><i className={`fa-solid ${diff > 0 ? 'fa-arrow-up' : 'fa-arrow-down'} text-[8px]`}></i> {Math.abs((diff / prev.Total) * 100).toFixed(1)}%</span>; })()}</div></div>
                                {renderRow('Credit Card', monthData['Credit Card'], prev?.['Credit Card'])}
                                {renderRow('Household', monthData.Household, prev?.Household)}
                                {renderRow('Ad-hoc', monthData['Ad-hoc'], prev?.['Ad-hoc'])}
                            </div>
                        );
                    } else if (type === 'bar') {
                        title = `${monthData.name} - Ad-hoc Breakdown`;
                        const list1 = [...(monthData.adhocU1List || [])].sort((a,b) => b.amount - a.amount), list2 = [...(monthData.adhocU2List || [])].sort((a,b) => b.amount - a.amount);
                        content = (
                            <div className="space-y-4 text-sm">
                                <div>
                                    <div className="flex justify-between border-b border-gray-100 dark:border-[#333] pb-1 mb-2"><span className="text-gray-500 font-bold">{user1Name}'s Spikes:</span> <span className="font-bold text-blue-500">{formatMoney(monthData[user1Name])}</span></div>
                                    {list1.slice(0, 3).map((item, i) => <div key={i} className="flex justify-between text-xs text-gray-600 dark:text-gray-400 mb-1 pl-1"><span className="truncate pr-2"><i className="fa-solid fa-tag text-blue-400 text-[10px] mr-1"></i> {item.desc}</span><span>{formatMoney(item.amount)}</span></div>)}
                                    {list1.length === 0 && <div className="text-xs text-gray-400 pl-1">No ad-hoc spikes logged.</div>}
                                </div>
                                <div>
                                    <div className="flex justify-between border-b border-gray-100 dark:border-[#333] pb-1 mb-2"><span className="text-gray-500 font-bold">{user2Name}'s Spikes:</span> <span className="font-bold text-purple-500">{formatMoney(monthData[user2Name])}</span></div>
                                    {list2.slice(0, 3).map((item, i) => <div key={i} className="flex justify-between text-xs text-gray-600 dark:text-gray-400 mb-1 pl-1"><span className="truncate pr-2"><i className="fa-solid fa-tag text-purple-400 text-[10px] mr-1"></i> {item.desc}</span><span>{formatMoney(item.amount)}</span></div>)}
                                    {list2.length === 0 && <div className="text-xs text-gray-400 pl-1">No ad-hoc spikes logged.</div>}
                                </div>
                            </div>
                        );
                    }
                } else if (type === 'pie') {
                    title = `Aggregate Share Summary`;
                    const totalTracked = pieData.reduce((acc, curr) => acc + curr.value, 0);
                    content = (
                        <div className="space-y-4 text-sm">
                            {pieData.map((d, i) => (
                                <div key={i} className="space-y-2 border-b border-gray-100 dark:border-[#333] pb-3 last:border-0">
                                    <div className="flex justify-between items-center bg-gray-50 dark:bg-[#1e1e1e] p-3 rounded-[20px] border dark:border-[#333]"><span className="text-gray-500 text-xs uppercase font-bold tracking-wider">{d.name}'s Split</span><span className="font-black text-xl text-gray-800 dark:text-gray-200">{totalTracked > 0 ? ((d.value / totalTracked) * 100).toFixed(1) : 0}%</span></div>
                                    <div className="flex justify-between px-1"><span className="text-gray-500">Cumulative Value:</span> <span className="font-bold">{formatMoney(d.value)}</span></div>
                                </div>
                            ))}

                        </div>
                    );
                }
                setPopupData({ title, content });
            };

            const toggleChart = (e, id) => { e.stopPropagation(); setMinimizedCharts(prev => ({...prev, [id]: !prev[id]})); };

            const shareBorrowLedger = (borrow) => {
                let text = `📒 *BORROW LEDGER*\n━━━━━━━━━━━━━━━━━━━━━\n\n📌 *${borrow.desc}*\n👤 *Borrower:* ${borrow.borrower}\n📅 *Originated:* ${formatMonthName(borrow.month)}\n\n💰 *Principal:* ${formatMoney(borrow.totalAmount)}\n📉 *Remaining:* ${formatMoney(borrow.remainingAmount)}\n\n`;
                if (borrow.history && borrow.history.length > 0) { text += `*Repayment History:*\n`; borrow.history.forEach(h => { text += `✔️ ${formatMonthName(h.date)}: ${formatMoney(h.amount)}\n`; }); } else { text += `_No repayments made yet._\n`; }
                text += `\n✨ _Generated via BillSplit_`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
            };

            const COLORS = ['#3b82f6', '#a855f7'];

            const renderUserBreakdown = (userName, cardsData) => {
                if (!cardsData || cardsData.length === 0) return null;
                let ccSpends = [], hhSpends = [], specificDeds = [], ccTotal = 0, hhTotal = 0, dedTotal = 0;
                const isUser1 = userName === user1Name;
                cardsData.forEach(c => {
                    if (!c) return;
                    const isArray = Array.isArray(c), cName = (isArray ? c[1] : c.cardName) || 'Unknown';
                    const uShare = isArray ? (parseFloat(c[isUser1 ? 3 : 4]) || 0) : (parseFloat(isUser1 ? c.u1Share : c.u2Share) || 0);
                    let overrides = isArray ? parseDeductionsLog(c[5]) : (c.overrides || []);
                    if (cName === 'Offline & Fixed Spends') {
                        overrides.forEach(ov => { if (!ov || !ov.owner) return; let itemShare = 0; if (ov.owner === userName) itemShare = parseFloat(ov.amount) || 0; else if (ov.owner === 'Split') itemShare = (parseFloat(ov.amount) || 0) / 2; if (itemShare > 0) { hhSpends.push({ desc: ov.desc || 'Item', amount: itemShare }); hhTotal += itemShare; } });
                    } else if (cName !== 'Settle Borrow') {
                        let cardBaseShare = uShare;
                        overrides.forEach(ov => {
                            if (!ov || !ov.owner) return;
                            if (ov.owner === userName || ov.owner === 'Split') {
                                const dedAmt = ov.owner === userName ? (parseFloat(ov.amount) || 0) : (parseFloat(ov.amount) || 0) / 2;
                                if (DEFAULT_OFFLINE_SPENDS.some(def => (ov.desc || '').toLowerCase().includes(def.toLowerCase()))) { hhSpends.push({ desc: `${ov.desc} (${cName})`, amount: dedAmt }); hhTotal += dedAmt; } 
                                else { specificDeds.push({ desc: `${ov.desc} (${cName})`, amount: dedAmt }); dedTotal += dedAmt; }
                                cardBaseShare -= dedAmt;
                            }
                        });
                        if (cardBaseShare > 0) { ccSpends.push({ desc: cName, amount: cardBaseShare }); ccTotal += cardBaseShare; }
                    }
                });

                return (
                    <div className="mt-4 mb-2 p-5 bg-white dark:bg-[#1a1a1a] rounded-[24px] shadow-sm border border-gray-100 dark:border-[#333] spring-up relative">
