                            <h4 className="font-black text-gray-800 dark:text-gray-100"><i className="fa-solid fa-chart-pie text-teal-600 dark:text-teal-400 mr-2"></i>{userName}'s Breakdown</h4>
                            <div className="flex gap-2">
                                <button onClick={() => setExpandedUser(null)} className="text-gray-400 hover:text-red-500 transition-all active:scale-[0.97] w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 dark:bg-[#252525]"><i className="fa-solid fa-times text-sm"></i></button>
                            </div>
                        </div>

                        <div className="space-y-5">
                            {hhSpends.length > 0 && (
                                <div>
                                    <div className="flex justify-between font-bold text-teal-700 dark:text-teal-400 mb-2 text-[11px] uppercase tracking-widest border-b border-teal-50 dark:border-teal-900/30 pb-1.5"><span>Household Spends</span><span>{formatMoney(hhTotal)}</span></div>
                                    <div className="space-y-2">{hhSpends.map((item, i) => <div key={i} className="flex justify-between text-gray-600 dark:text-gray-400 text-xs pl-1"><span className="truncate pr-2"><i className="fa-solid fa-angle-right text-[8px] text-teal-300 dark:text-teal-700 mr-2"></i>{item.desc}</span><span className="font-bold text-gray-700 dark:text-gray-300">{formatMoney(item.amount)}</span></div>)}</div>
                                </div>
                            )}
                            {ccSpends.length > 0 && (
                                <div>
                                    <div className="flex justify-between font-bold text-blue-700 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest border-b border-blue-50 dark:border-blue-900/30 pb-1.5"><span>Credit Card Spends</span><span>{formatMoney(ccTotal)}</span></div>
                                    <div className="space-y-2">{ccSpends.map((item, i) => <div key={i} className="flex justify-between text-gray-600 dark:text-gray-400 text-xs pl-1"><span className="truncate pr-2"><i className="fa-regular fa-credit-card text-[9px] text-blue-300 dark:text-blue-700 mr-2"></i>{item.desc}</span><span className="font-bold text-gray-700 dark:text-gray-300">{formatMoney(item.amount)}</span></div>)}</div>
                                </div>
                            )}
                            {specificDeds.length > 0 && (
                                <div>
                                    <div className="flex justify-between font-bold text-purple-700 dark:text-purple-400 mb-2 text-[11px] uppercase tracking-widest border-b border-purple-50 dark:border-purple-900/30 pb-1.5"><span>Ad-hoc Spends</span><span>{formatMoney(dedTotal)}</span></div>
                                    <div className="space-y-2">{specificDeds.map((item, i) => <div key={i} className="flex justify-between text-gray-600 dark:text-gray-400 text-xs pl-1"><span className="truncate pr-2"><i className="fa-solid fa-tag text-[9px] text-purple-300 dark:text-purple-700 mr-2"></i>{item.desc}</span><span className="font-bold text-gray-700 dark:text-gray-300">{formatMoney(item.amount)}</span></div>)}</div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderChart = (id, index) => {
                const isMin = minimizedCharts[id];
                let title = "", subtitle = "";
                if (id === 'trend') { title = "Household Spend Trend"; subtitle = "Total gross vs cc vs actual household vs ad-hoc."; }
                if (id === 'pie') { title = `${timeframe} Aggregate Split`; subtitle = "Overall cumulative share breakdown."; }
                if (id === 'bar') { title = "Ad-hoc Spend Volume"; subtitle = "Individual spikes parsed from ad-hoc spends."; }

                return (
                    <div key={id} draggable onDragStart={(e) => handleDragStart(e, id)} onDragOver={(e) => e.preventDefault()} onDrop={(e) => handleDrop(e, id)} className="bg-[var(--surface-tonal)] border border-gray-100 dark:border-[#333] rounded-[32px] p-5 shadow-sm mb-6 relative cursor-move hover:shadow-md transition-shadow pt-14">
                        <div className="absolute top-4 right-4 flex items-center gap-2 z-10">
                            {!isMin && (
                                <div className="flex bg-gray-50 dark:bg-[#252525] rounded-full overflow-hidden border border-gray-100 dark:border-[#333] transition-all">
                                    <button onClick={() => moveChart(index, 'up')} disabled={index === 0} className="px-3 py-2 hover:bg-gray-200 dark:hover:bg-[#333] active:bg-gray-300 hover:text-teal-600 disabled:opacity-30 border-r border-gray-100 dark:border-[#333] transition-colors"><i className="fa-solid fa-arrow-up text-xs"></i></button>
                                    <button onClick={() => moveChart(index, 'down')} disabled={index === chartOrder.length - 1} className="px-3 py-2 hover:bg-gray-200 dark:hover:bg-[#333] active:bg-gray-300 hover:text-teal-600 disabled:opacity-30 transition-colors"><i className="fa-solid fa-arrow-down text-xs"></i></button>
                                </div>
                            )}
                            <button onClick={(e) => toggleChart(e, id)} className={`flex items-center gap-1 px-4 py-2 rounded-full text-xs font-bold transition-all active:scale-[0.95] ${isMin ? 'bg-teal-50 text-teal-700 border border-teal-100 dark:border-teal-900/50' : 'bg-gray-50 text-gray-500 border border-gray-100 hover:bg-gray-100 dark:bg-[#252525] dark:border-[#333] dark:hover:bg-[#333]'}`}>
                                {isMin ? <><i className="fa-solid fa-expand"></i> Expand</> : <><i className="fa-solid fa-compress"></i></>}
                            </button>
                        </div>
                        <div className="pr-2"><p className="text-base font-black text-gray-800 dark:text-gray-100 mb-1">{title}</p>{!isMin && <p className="text-[11px] font-medium text-gray-500 mb-4 tracking-wide">{subtitle}</p>}</div>

                        {!isMin && (
                            <button onClick={(e) => { e.stopPropagation(); handleChartClick(id); }} className="absolute bottom-4 right-4 bg-gray-50 hover:bg-gray-200 active:scale-[0.95] dark:bg-[#252525] dark:hover:bg-[#333] text-gray-500 w-8 h-8 rounded-full border border-gray-100 dark:border-[#444] shadow-sm flex items-center justify-center transition-all z-20 text-[10px]"><i className="fa-solid fa-question"></i></button>
                        )}

                        <div className={`overflow-x-auto hide-scrollbar ${!isMin ? 'mt-4 fade-in' : 'hidden'}`}>
                            <div className={isWideTimeline && id !== 'pie' ? 'w-[1000px] h-64' : 'w-full h-64'}>
                                {id === 'trend' && (
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={chartData} margin={{ top: 5, right: 10, left: -20, bottom: 5 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(150,150,150,0.2)" />
                                            <XAxis dataKey="name" tick={{fontSize: 10, fontWeight: 'bold'}} tickMargin={10} axisLine={false} tickLine={false} />
                                            <YAxis tickFormatter={(val) => `₹${val/1000}k`} tick={{fontSize: 10, fontWeight: 'bold'}} axisLine={false} tickLine={false} />
                                            <Tooltip formatter={(value) => formatMoney(value)} contentStyle={{ backgroundColor: 'var(--tooltip-bg)', color: 'var(--tooltip-text)', borderRadius: '20px', border: '1px solid var(--tooltip-border)', boxShadow: '0 10px 30px -5px rgba(0, 0, 0, 0.15)', backdropFilter: 'blur(12px)', padding: '12px' }} itemStyle={{ fontSize: '12px', fontWeight: 'bold' }} cursor={{ stroke: 'rgba(150, 150, 150, 0.3)', strokeWidth: 1, strokeDasharray: '3 3' }} />
                                            <Legend wrapperStyle={{fontSize: '11px', paddingTop: '10px', fontWeight: 'bold'}} />
                                            <Line type="monotone" name="Total Spends" dataKey="Total" stroke="#0f766e" strokeWidth={3} dot={{r: 4, fill: '#0f766e', strokeWidth: 2, stroke: '#fff'}} />
                                            <Line type="monotone" name="Credit Card" dataKey="Credit Card" stroke="#3b82f6" strokeWidth={2} dot={false} />
                                            <Line type="monotone" name="Household" dataKey="Household" stroke="#eab308" strokeWidth={3} dot={{r: 4, fill: '#eab308', strokeWidth: 2, stroke: '#fff'}} />
                                            <Line type="monotone" name="Ad-hoc" dataKey="Ad-hoc" stroke="#ef4444" strokeWidth={2} dot={false} />
                                        </LineChart>
                                    </ResponsiveContainer>
                                )}
                                {id === 'pie' && (
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={pieData} cx="50%" cy="50%" innerRadius={60} outerRadius={85} paddingAngle={3} dataKey="value" stroke="none">
                                                {pieData.map((entry, idx) => <Cell key={`cell-${idx}`} fill={COLORS[idx % COLORS.length]} />)}
                                            </Pie>
                                            <Tooltip formatter={(value) => formatMoney(value)} contentStyle={{ backgroundColor: 'var(--tooltip-bg)', color: 'var(--tooltip-text)', borderRadius: '20px', border: '1px solid var(--tooltip-border)', boxShadow: '0 10px 30px -5px rgba(0, 0, 0, 0.15)', backdropFilter: 'blur(12px)', padding: '12px' }} itemStyle={{fontSize: '12px', fontWeight: 'bold'}} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                )}
                                {id === 'bar' && (
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={chartData} margin={{ top: 5, right: 10, left: -20, bottom: 5 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(150,150,150,0.2)" />
                                            <XAxis dataKey="name" tick={{fontSize: 10, fontWeight: 'bold'}} tickMargin={10} axisLine={false} tickLine={false} />
                                            <YAxis tickFormatter={(val) => `₹${val/1000}k`} tick={{fontSize: 10, fontWeight: 'bold'}} axisLine={false} tickLine={false} />
                                            <Tooltip content={<CustomBarTooltip />} cursor={{fill: 'rgba(150, 150, 150, 0.1)', radius: 8}} />
                                            <Bar dataKey={user1Name} stackId="a" fill="#3b82f6" radius={[0, 0, 4, 4]} maxBarSize={30} />
                                            <Bar dataKey={user2Name} stackId="a" fill="#a855f7" radius={[6, 6, 0, 0]} maxBarSize={30} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                )}
                                {id === 'pie' && !isMin && (
                                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-10">
                                        <div className="inline-block mt-1">
                                            <div className="flex items-center gap-1.5 text-[11px] font-black text-blue-500 tracking-wide mb-1"><span className="w-2.5 h-2.5 rounded-full bg-blue-500"></span>{user1Name}</div>
                                            <div className="flex items-center gap-1.5 text-[11px] font-black text-purple-500 tracking-wide"><span className="w-2.5 h-2.5 rounded-full bg-purple-500"></span>{user2Name}</div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto bg-gray-50 min-h-screen shadow-2xl pb-32 relative overflow-hidden">
                    <header className="bg-white/80 backdrop-blur-md text-gray-800 p-5 sticky top-0 z-30 flex justify-between items-center transition-colors">
                        <h1 className="text-2xl font-black tracking-tight"><i className="fa-solid fa-file-invoice-dollar mr-2 text-teal-600"></i>BillSplit</h1>
                        <button onClick={() => setView('settings')} className="bg-gray-100 dark:bg-[#252525] hover:bg-gray-200 dark:hover:bg-[#333] text-gray-600 dark:text-gray-300 w-10 h-10 rounded-full flex items-center justify-center transition-all active:scale-[0.90] active:rotate-45">
                            <i className="fa-solid fa-gear text-lg"></i>
                        </button>
                    </header>

                    <main className="p-4 fade-in relative z-10">
                        {view === 'entry' && (
                            <div className="space-y-6">
                                <label className="block bg-teal-50 dark:bg-teal-900/20 border border-teal-100 dark:border-teal-800/30 p-5 rounded-[28px] flex flex-col justify-center items-center shadow-sm text-center transition-all relative overflow-hidden cursor-pointer hover:bg-teal-100 dark:hover:bg-teal-900/40">
                                    <input type="month" value={selectedMonth} onChange={e => {setSelectedMonth(e.target.value); setIsReviewingDraft(false);}} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                    <span className="font-bold text-teal-800 dark:text-teal-400 text-xs uppercase tracking-widest mb-2"><i className="fa-regular fa-calendar mr-2"></i>Select a Billing Cycle</span>
                                    <div className="text-xl font-black text-gray-800 dark:text-gray-200">
                                        {selectedMonth ? formatMonthName(selectedMonth) : "Tap to Select Month"}
                                    </div>
                                </label>

                                {!selectedMonth ? (
                                    <div className="text-center py-20 text-gray-400 fade-in">
                                        <div className="w-24 h-24 mx-auto bg-white dark:bg-[#1a1a1a] shadow-sm border border-gray-100 dark:border-[#333] rounded-full flex items-center justify-center mb-6"><i className="fa-regular fa-calendar-check text-4xl text-gray-300 dark:text-gray-600"></i></div>
                                        <p className="font-black text-xl tracking-tight mb-2 text-gray-600 dark:text-gray-300">No Cycle Selected</p>
                                        <p className="text-sm font-medium px-4">Choose a month above to view, audit, or edit your financial logs.</p>
                                    </div>
                                ) : (
                                    <div className="fade-in space-y-6">
                                        <div className="flex justify-between items-center bg-white dark:bg-[#1a1a1a] p-4 rounded-[20px] shadow-sm border border-gray-100 dark:border-[#333]">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-3 h-3 rounded-full ${isEditMode ? 'bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.6)] animate-pulse' : 'bg-gray-300 dark:bg-gray-600'}`}></div>

                    <nav className={`fixed left-1/2 -translate-x-1/2 w-[92%] max-w-[380px] bg-white/80 dark:bg-[#1a1a1a]/80 backdrop-blur-2xl border border-white/40 dark:border-[#333]/50 rounded-full p-2 flex justify-between items-center z-40 shadow-[0_15px_35px_-5px_rgba(0,0,0,0.15),0_0_0_1px_rgba(0,0,0,0.02)] transition-all duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] ${isNavVisible && !historyHubOpen && !showHistory && !borrowLedgerModalOpen ? 'bottom-6 translate-y-0 opacity-100' : 'bottom-0 translate-y-24 opacity-0 pointer-events-none'}`}>
                        <button onClick={() => setHistoryHubOpen(true)} className="flex-1 py-3 flex flex-col items-center justify-center text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 transition-colors active:scale-95"><i className="fa-solid fa-layer-group text-xl mb-1.5"></i><span className="text-[9px] font-black tracking-widest uppercase">Hub</span></button>
                        <div className="flex-none px-2 relative -top-6"><button onClick={() => setView('dashboard')} className={`w-16 h-16 rounded-[24px] flex items-center justify-center text-2xl shadow-[0_10px_25px_rgba(15,118,110,0.3)] transition-all duration-300 active:scale-95 ${view === 'dashboard' ? 'bg-teal-700 text-white scale-110' : 'bg-white dark:bg-[#252525] text-gray-400 border-[4px] border-gray-50 dark:border-[#111]'}`}><i className="fa-solid fa-chart-pie"></i></button></div>
                        <button onClick={() => {setView('entry'); setSelectedMonth(''); setIsReviewingDraft(false);}} className={`flex-1 py-3 flex flex-col items-center justify-center transition-colors active:scale-95 ${view === 'entry' ? 'text-teal-700 dark:text-teal-400' : 'text-gray-400 hover:text-gray-800 dark:hover:text-gray-200'}`}><i className="fa-solid fa-pen-to-square text-xl mb-1.5"></i><span className="text-[9px] font-black tracking-widest uppercase">Entry</span></button>
                    </nav>

                    {snapshotPayload && (
                        <div className="fixed top-[-9999px] left-[-9999px] z-[-1] p-8">
                            <div id="offscreen-render" className="bg-[#1a1a1a] rounded-[32px] p-8 w-[500px] text-white shadow-2xl border border-[#333]">
                                <div className="flex items-center gap-4 mb-8 pb-5 border-b border-[#333]">
                                    <i className="fa-solid fa-chart-pie text-teal-400 text-3xl"></i>
                                    <h2 className="text-2xl font-black">{snapshotPayload.scope === 'All' ? `${snapshotPayload.monthName} Summary` : (snapshotPayload.scope.includes('Only') ? snapshotPayload.scope : `${snapshotPayload.scope}'s Breakdown`)}</h2>
                                </div>
                                {snapshotPayload.scope === 'All' && (
                                    <div className="mb-8">
                                        <div className="flex justify-between items-end mb-5">
                                            <span className="text-gray-400 text-[11px] font-black uppercase tracking-widest">Total Spends</span>
                                            <span className="text-3xl font-black tracking-tighter">{formatMoney(snapshotPayload.mTotal)}</span>
                                        </div>
                                        <div className="flex justify-between text-base border-b border-[#333] pb-5">
                                            <span><span className="text-blue-400 font-bold mr-2">{user1Name}</span>{formatMoney(snapshotPayload.mU1)}</span>
                                            <span><span className="text-purple-400 font-bold mr-2">{user2Name}</span>{formatMoney(snapshotPayload.mU2)}</span>
                                        </div>
                                    </div>
                                )}
                                {snapshotPayload.hhSpends.length > 0 && (
                                    <div className="mb-8">
                                        <div className="flex justify-between items-center text-[#14b8a6] text-sm font-black uppercase tracking-widest mb-4 border-b border-[#14b8a6]/20 pb-3">
                                            <span>Household Spends</span><span>{formatMoney(snapshotPayload.hhTotal)}</span>
                                        </div>
                                        <div className="space-y-3.5">
                                            {snapshotPayload.hhSpends.map((item, i) => (
                                                <div key={i} className="flex justify-between text-[15px] text-gray-300">
                                                    <span className="flex items-center gap-3 truncate pr-2"><i className="fa-solid fa-angle-right text-[#14b8a6]/70 text-[11px]"></i>{item.desc}</span>
                                                    <span className="font-bold text-white">{formatMoney(item.amount)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {snapshotPayload.ccSpends.length > 0 && (
                                    <div className="mb-8">
                                        <div className="flex justify-between items-center text-[#3b82f6] text-sm font-black uppercase tracking-widest mb-4 border-b border-[#3b82f6]/20 pb-3">
                                            <span>Credit Card Spends</span><span>{formatMoney(snapshotPayload.ccTotal)}</span>
                                        </div>
                                        <div className="space-y-3.5">
                                            {snapshotPayload.ccSpends.map((item, i) => (
                                                <div key={i} className="flex justify-between text-[15px] text-gray-300">
                                                    <span className="flex items-center gap-3 truncate pr-2"><i className="fa-regular fa-credit-card text-[#3b82f6]/70 text-[11px]"></i>{item.desc}</span>
                                                    <span className="font-bold text-white">{formatMoney(item.amount)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {snapshotPayload.adhocSpends.length > 0 && (
                                    <div className="mb-8">
                                        <div className="flex justify-between items-center text-[#a855f7] text-sm font-black uppercase tracking-widest mb-4 border-b border-[#a855f7]/20 pb-3">
                                            <span>Ad-hoc Spends</span><span>{formatMoney(snapshotPayload.adhocTotal)}</span>
                                        </div>
                                        <div className="space-y-3.5">
                                            {snapshotPayload.adhocSpends.map((item, i) => (
                                                <div key={i} className="flex justify-between text-[15px] text-gray-300">
                                                    <span className="flex items-center gap-3 truncate pr-2"><i className="fa-solid fa-tag text-[#a855f7]/70 text-[11px]"></i>{item.desc}</span>
                                                    <span className="font-bold text-white">{formatMoney(item.amount)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) return (
                    <div className="p-6 bg-[#000000] text-gray-200 min-h-screen flex items-center justify-center">
                        <div className="bg-[#1a1a1a] p-8 rounded-[36px] shadow-2xl border border-red-900/30 w-full max-w-sm text-center">
                            <div className="w-20 h-20 bg-red-900/20 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-triangle-exclamation text-4xl text-red-500"></i></div>
                            <h1 className="text-2xl font-black mb-2 tracking-tight text-white">System Crash</h1><p className="text-sm font-medium text-gray-400 mb-6">An unexpected error occurred in the component tree.</p>
                            <div className="text-[10px] bg-[#252525] p-4 rounded-2xl border border-[#333] break-words font-mono text-left text-gray-400 shadow-inner max-h-32 overflow-y-auto mb-8">{this.state.error?.toString()}</div>
                            <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="w-full bg-white text-black p-4 rounded-[24px] font-black text-lg hover:bg-gray-200 active:scale-[0.95] transition-all">Factory Reset</button>
                        </div>
                    </div>
                );
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
