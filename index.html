<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillSplit Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f9fafb;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Android 17 / Material 3 Fluid Spring Animations */
        @keyframes springUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .spring-up { animation: springUp 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes slideSheetUp {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }
        .sheet-up { animation: slideSheetUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Dynamic Tooltip Variables */
        :root {
            --tooltip-bg: rgba(255, 255, 255, 0.9);
            --tooltip-text: #1f2937;
            --tooltip-border: rgba(200, 200, 200, 0.2);
            --surface-tonal: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            body { background-color: #000000 !important; }
            .bg-gray-50 { background-color: #0a0a0a !important; }
            .bg-gray-100 { background-color: #000000 !important; }
            .bg-white { background-color: #111111 !important; }
            
            .text-gray-800, .text-gray-700 { color: #e5e7eb !important; }
            .text-gray-600, .text-gray-500 { color: #9ca3af !important; }
            
            .border, .border-gray-200, .border-gray-100, .border-b, .border-t { border-color: #222222 !important; }
            input, select { background-color: #1a1a1a !important; color: #ffffff !important; border-color: #333 !important; color-scheme: dark; }
            
            /* Tonal Surfaces for Material 3 Dark Mode */
            .bg-teal-50 { background-color: #022c22 !important; border-color: transparent !important; }
            .text-teal-800 { color: #5eead4 !important; }
            .bg-blue-50 { background-color: #082f49 !important; border-color: transparent !important; }
            .text-blue-800, .text-blue-700 { color: #93c5fd !important; }
            .bg-purple-50 { background-color: #3b0764 !important; border-color: transparent !important; }
            .text-purple-800, .text-purple-700 { color: #d8b4fe !important; }
            .bg-amber-300 { background-color: #78350f !important; color: #fde68a !important; }
            
            header, .absolute.bottom-16.right-0.bg-white { background-color: #000000 !important; border-color: #1f2937 !important; }
            
            .recharts-cartesian-grid-horizontal line { stroke: #222 !important; }
            .recharts-text { fill: #9ca3af !important; }
            
            :root {
                --tooltip-bg: rgba(20, 20, 20, 0.9);
                --tooltip-text: #f3f4f6;
                --tooltip-border: rgba(80, 80, 80, 0.4);
                --surface-tonal: #111111;
            }
            .recharts-tooltip-item { color: #f3f4f6 !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { LineChart, Line, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts;

        const DEFAULT_OFFLINE_SPENDS = ['Home Loan EMI', 'Monthly Rent', 'Society Maintenance', 'Cook Salary', 'Cleaning Maid Salary', 'Nanny Salary', 'Grocery', 'Car Wash', 'Electricity Bill', 'Broadband Bill'];
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

        const App = () => {
            const [view, setView] = useState('dashboard'); 
            const [isSyncing, setIsSyncing] = useState(false);
            const [isLoadingInitial, setIsLoadingInitial] = useState(false);
            const [fetchedSummary, setFetchedSummary] = useState([]);
            const [fetchedCards, setFetchedCards] = useState([]);
            const [activeBorrows, setActiveBorrows] = useState([]);
            
            const [shareModalOpen, setShareModalOpen] = useState(false);
            const [expandedUser, setExpandedUser] = useState(null);
            const [popupData, setPopupData] = useState(null);
            
            // UI States
            const [historyHubOpen, setHistoryHubOpen] = useState(false);
            const [isNavVisible, setIsNavVisible] = useState(true);
            const [showHistory, setShowHistory] = useState(false);
            const [borrowLedgerModalOpen, setBorrowLedgerModalOpen] = useState(false);
            
            const [shareSelectedBorrow, setShareSelectedBorrow] = useState(null);
            const [expandedBorrow, setExpandedBorrow] = useState(null);

            const [chartOrder, setChartOrder] = useState(() => {
                try { const saved = localStorage.getItem('bs_chart_order'); return saved ? JSON.parse(saved) : ['trend', 'pie', 'bar']; } 
                catch { return ['trend', 'pie', 'bar']; }
            });
            const [minimizedCharts, setMinimizedCharts] = useState(() => {
                try { const saved = localStorage.getItem('bs_minimized_charts'); return saved ? JSON.parse(saved) : {}; } 
                catch { return {}; }
            });

            const [scriptUrl, setScriptUrl] = useState(() => localStorage.getItem('bs_script_url') || '');
            const [user1Name, setUser1Name] = useState(() => localStorage.getItem('bs_user1_name') || 'Amit');
            const [user2Name, setUser2Name] = useState(() => localStorage.getItem('bs_user2_name') || 'Alka');
            
            const getCurrentMonth = () => {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            };
            const [selectedMonth, setSelectedMonth] = useState(getCurrentMonth());

            const [cardList, setCardList] = useState([]);
            const [newCardName, setNewCardName] = useState('');
            const [isAddingCard, setIsAddingCard] = useState(false);
            
            const [formData, setFormData] = useState({});
            const initOfflineSpends = () => DEFAULT_OFFLINE_SPENDS.map(desc => ({ id: generateId(), desc, amount: '', owner: 'Auto', isCustom: false }));
            const [offlineSpends, setOfflineSpends] = useState(initOfflineSpends());
            
            const [newBorrows, setNewBorrows] = useState([]);
            const [repayments, setRepayments] = useState({});

            const [historyMonth, setHistoryMonth] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [timeframe, setTimeframe] = useState('Rolling 12');

            const rules = useMemo(() => ({
                cards: { 'HDFC Swiggy': user2Name, 'Axis Airtel': user1Name },
                categories: {
                    'Cook Salary': user1Name, 'Cleaning Maid Salary': user1Name, 'Nanny Salary': user1Name, 'Car Wash': user1Name,
                    'Electricity Bill': user1Name, 'Broadband Bill': user1Name, 'Monthly Rent': 'Split',
                    'Society Maintenance': 'Split', 'Home Loan EMI': 'Split', 'Grocery': 'Split'
                }
            }), [user1Name, user2Name]);

            // Scroll Listener for Auto-Hiding Nav
            useEffect(() => {
                let lastScrollY = window.scrollY;
                const handleScroll = () => {
                    const currentScrollY = window.scrollY;
                    if (currentScrollY > lastScrollY && currentScrollY > 50) {
                        setIsNavVisible(false);
                    } else {
                        setIsNavVisible(true);
                    }
                    lastScrollY = currentScrollY;
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const toYYYYMM = (dateVal) => {
                if (!dateVal) return '';
                const s = String(dateVal);
                if (s.includes('T')) {
                    const d = new Date(s);
                    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                }
                const parts = s.split('-');
                if (parts.length >= 2) return `${parts[0]}-${parts[1].padStart(2, '0')}`;
                return s.substring(0, 7); 
            };

            useEffect(() => { localStorage.setItem('bs_chart_order', JSON.stringify(chartOrder)); }, [chartOrder]);
            useEffect(() => { localStorage.setItem('bs_minimized_charts', JSON.stringify(minimizedCharts)); }, [minimizedCharts]);

            useEffect(() => {
                if (scriptUrl) fetchAllData();
            }, [scriptUrl]);

            useEffect(() => {
                if (fetchedSummary && fetchedSummary.length > 0 && !historyMonth) {
                    const lastRow = fetchedSummary[fetchedSummary.length - 1];
                    if (lastRow && lastRow[0]) setHistoryMonth(toYYYYMM(lastRow[0]));
                }
            }, [fetchedSummary]);

            const sortedCardList = useMemo(() => {
                if (!cardList.length) return [];
                if (!fetchedCards.length) return cardList;

                const sortedMonths = [...new Set(fetchedCards.filter(c => c && c[0]).map(c => toYYYYMM(c[0])))].sort().slice(-6);
                const recentCards = fetchedCards.filter(c => c && c[0] && sortedMonths.includes(toYYYYMM(c[0])));

                const counts = {};
                cardList.forEach(c => counts[c] = 0);

                recentCards.forEach(c => {
                    if (c[1] && counts[c[1]] !== undefined && parseFloat(c[2]) > 0) counts[c[1]]++;
                });

                return [...cardList].sort((a, b) => counts[b] - counts[a]);
            }, [cardList, fetchedCards]);

            useEffect(() => {
                setFormData(prev => {
                    const updated = { ...prev };
                    sortedCardList.forEach(c => {
                        if (!updated[c]) updated[c] = { total: '', overrides: [] };
                    });
                    return updated;
                });
            }, [sortedCardList]);

            const fetchAllData = async () => {
                if (!scriptUrl.trim()) return;
                setIsLoadingInitial(true);
                try {
                    const response = await fetch(`${scriptUrl.trim()}?action=getAllData`);
                    const result = await response.json();
                    
                    if (result.ok && result.data) {
                        setFetchedSummary(result.data.summary || []);
                        setFetchedCards(result.data.cards || []);
                        if (result.data.myCards && result.data.myCards.length > 0) setCardList(result.data.myCards);
                        if (result.data.activeBorrows) setActiveBorrows(result.data.activeBorrows);
                    }
                } catch (error) {
                    alert("Could not load data. Ensure your URL is correct and deployed securely.");
                } finally {
                    setIsLoadingInitial(false);
                }
            };

            const handleAddCard = async () => {
                if (!newCardName.trim() || !scriptUrl) return;
                setIsAddingCard(true);
                try {
                    await fetch(scriptUrl.trim(), {
                        method: 'POST',
                        body: JSON.stringify({ action: 'addCard', cardName: newCardName.trim() }),
                        mode: 'no-cors'
                    });
                    
                    setCardList(prev => [...prev, newCardName.trim()]);
                    setNewCardName('');
                    alert('Card added! Syncing list...');
                    setTimeout(fetchAllData, 1000); 
                } catch (e) {
                    alert('Failed to add card to sheet.');
                } finally {
                    setIsAddingCard(false);
                }
            };

            const handleTotalChange = (card, value) => setFormData(prev => ({ ...prev, [card]: { ...prev[card], total: value } }));
            const addOverride = (card) => setFormData(prev => ({ ...prev, [card]: { ...prev[card], overrides: [...prev[card].overrides, { id: generateId(), desc: '', amount: '', owner: user1Name }] } }));
            const updateOverride = (card, id, field, value) => setFormData(prev => ({ ...prev, [card]: { ...prev[card], overrides: prev[card].overrides.map(ov => ov.id === id ? { ...ov, [field]: value } : ov) } }));
            const removeOverride = (card, id) => setFormData(prev => ({ ...prev, [card]: { ...prev[card], overrides: prev[card].overrides.filter(ov => ov.id !== id) } }));
            
            const handleOfflineChange = (id, field, value) => setOfflineSpends(prev => prev.map(exp => exp.id === id ? { ...exp, [field]: value } : exp));
            const addCustomOfflineSpend = () => setOfflineSpends(prev => [...prev, { id: generateId(), desc: '', amount: '', owner: 'Split', isCustom: true }]);
            const removeOfflineSpend = (id) => setOfflineSpends(prev => prev.filter(exp => exp.id !== id));
            
            const handleNewBorrowChange = (id, field, value) => setNewBorrows(prev => prev.map(b => b.id === id ? { ...b, [field]: value } : b));
            const addNewBorrow = () => setNewBorrows(prev => [...prev, { id: generateId(), desc: '', amount: '', borrower: user1Name }]);
            const removeNewBorrow = (id) => setNewBorrows(prev => prev.filter(b => b.id !== id));

            const toggleRepayment = (id) => setRepayments(prev => ({...prev, [id]: { active: !prev[id]?.active, amount: prev[id]?.amount || '' }}));
            const handleRepaymentChange = (id, value, max) => {
                let val = parseFloat(value);
                if (val > max) val = max; 
                if (val < 0) val = 0;
                setRepayments(prev => ({...prev, [id]: { ...prev[id], amount: isNaN(val) ? '' : val }}));
            };

            const resetForm = () => {
                if (window.confirm("Are you sure you want to clear all entered data?")) {
                    const reset = {};
                    sortedCardList.forEach(c => reset[c] = { total: '', overrides: [] });
                    setFormData(reset);
                    setOfflineSpends(initOfflineSpends());
                    setNewBorrows([]);
                    setRepayments({});
                }
            };

            const submitForCalculation = () => {
                setView('dashboard');
                window.scrollTo(0, 0);
            };

            const formatMoney = (amount) => {
                const num = parseFloat(amount);
                if (isNaN(num)) return '---';
                const hasDecimal = num % 1 !== 0;
                return `₹ ${num.toLocaleString('en-IN', { minimumFractionDigits: hasDecimal ? 2 : 0, maximumFractionDigits: hasDecimal ? 2 : 0 })}`;
            };

            const formatMonthName = (dateStr) => {
                if (!dateStr) return '';
                try {
                    const clean = toYYYYMM(dateStr);
                    const parts = clean.split('-');
                    if (parts.length >= 2) {
                        const date = new Date(parts[0], parts[1] - 1);
                        return `${date.toLocaleDateString('en-US', { month: 'short' })}'${parts[0].slice(-2)}`;
                    }
                    return dateStr;
                } catch (e) {
                    return dateStr;
                }
            };

            const formatOverrideString = (ovStr) => {
                if (!ovStr) return '';
                const match = ovStr.match(/(.*)\s-\s₹([\d.]+)\s\((.*)\)/);
                if (match) return `${match[1].trim()} - ${formatMoney(match[2])} (${match[3].trim()})`;
                return ovStr;
            };

            const parseDeductionsLog = (logStr) => {
                if (!logStr || String(logStr) === 'None') return [];
                return String(logStr).split(' | ').map(item => {
                    const match = item.match(/(.*)\s-\s₹([\d.]+)\s\((.*)\)/);
                    if (match) return { desc: match[1].trim(), amount: parseFloat(match[2]), owner: match[3].trim() };
                    return null;
                }).filter(Boolean);
            };

            const moveChart = (index, direction) => {
                const newOrder = [...chartOrder];
                if (direction === 'up' && index > 0) [newOrder[index - 1], newOrder[index]] = [newOrder[index], newOrder[index - 1]];
                else if (direction === 'down' && index < newOrder.length - 1) [newOrder[index + 1], newOrder[index]] = [newOrder[index], newOrder[index + 1]];
                setChartOrder(newOrder);
            };

            const handleDragStart = (e, id) => { e.dataTransfer.setData("text/plain", id); e.dataTransfer.effectAllowed = "move"; };
            const handleDrop = (e, targetId) => {
                e.preventDefault();
                const draggedId = e.dataTransfer.getData("text");
                if (draggedId && draggedId !== targetId) {
                    const newOrder = [...chartOrder];
                    newOrder.splice(newOrder.indexOf(draggedId), 1);
                    newOrder.splice(newOrder.indexOf(targetId), 0, draggedId);
                    setChartOrder(newOrder);
                }
            };

            const activeCardsData = useMemo(() => {
                const processed = [];
                let grandTotal = 0, u1Grand = 0, u2Grand = 0;

                sortedCardList.forEach(cardName => {
                    if (!formData[cardName]) return;
                    const data = formData[cardName];
                    const totalAmt = parseFloat(data.total);
                    if (!isNaN(totalAmt) && totalAmt > 0) {
                        let totalOverrides = 0, u1Share = 0, u2Share = 0;
                        const cleanOverrides = [];

                        data.overrides.forEach(ov => {
                            const amt = parseFloat(ov.amount);
                            if (!isNaN(amt) && amt > 0) {
                                totalOverrides += amt;
                                cleanOverrides.push({ ...ov, amount: amt });
                                if (ov.owner === user1Name) u1Share += amt;
                                if (ov.owner === user2Name) u2Share += amt;
                            }
                        });

                        const remaining = Math.max(0, totalAmt - totalOverrides);
                        const defaultOwner = rules.cards[cardName] || 'Split';

                        if (defaultOwner === user1Name) u1Share += remaining;
                        else if (defaultOwner === user2Name) u2Share += remaining;
                        else { u1Share += (remaining / 2); u2Share += (remaining / 2); }

                        processed.push({ cardName, total: totalAmt, u1Share, u2Share, overrides: cleanOverrides });
                        grandTotal += totalAmt; u1Grand += u1Share; u2Grand += u2Share;
                    }
                });

                let offlineTotal = 0, offU1 = 0, offU2 = 0;
                const cleanOfflineOverrides = [];

                offlineSpends.forEach(exp => {
                    const amt = parseFloat(exp.amount);
                    if (!isNaN(amt) && amt > 0 && exp.desc.trim() !== '') {
                        offlineTotal += amt;
                        let finalOwner = exp.owner === 'Auto' ? (rules.categories[exp.desc] || 'Split') : exp.owner;
                        cleanOfflineOverrides.push({ desc: exp.desc, amount: amt, owner: finalOwner });

                        if (finalOwner === user1Name) offU1 += amt;
                        else if (finalOwner === user2Name) offU2 += amt;
                        else { offU1 += (amt / 2); offU2 += (amt / 2); }
                    }
                });

                if (offlineTotal > 0) {
                    processed.push({ cardName: 'Offline & Fixed Spends', total: offlineTotal, u1Share: offU1, u2Share: offU2, overrides: cleanOfflineOverrides });
                    grandTotal += offlineTotal; u1Grand += offU1; u2Grand += offU2;
                }

                let repaymentU1 = 0, repaymentU2 = 0;
                const cleanRepayments = [];

                Object.keys(repayments).forEach(id => {
                    const rep = repayments[id];
                    if (rep.active) {
                        const amt = parseFloat(rep.amount);
                        const borrowItem = activeBorrows.find(b => b.id === id);
                        if (!isNaN(amt) && amt > 0 && borrowItem) {
                            cleanRepayments.push({ desc: `${borrowItem.desc}`, amount: amt, owner: `Repayment from ${borrowItem.borrower}` });
                            
                            if (borrowItem.borrower === user1Name) {
                                repaymentU1 += amt; 
                                repaymentU2 -= amt; 
                            } else if (borrowItem.borrower === user2Name) {
                                repaymentU2 += amt; 
                                repaymentU1 -= amt; 
                            }
                        }
                    }
                });

                if (cleanRepayments.length > 0) {
                    processed.push({ cardName: 'Settle Borrow', total: 0, u1Share: repaymentU1, u2Share: repaymentU2, overrides: cleanRepayments });
                    u1Grand += repaymentU1;
                    u2Grand += repaymentU2;
                }

                return { cards: processed, summary: { total: grandTotal, u1Total: u1Grand, u2Total: u2Grand } };
            }, [formData, offlineSpends, activeBorrows, repayments, rules, user1Name, user2Name, sortedCardList]);

            const activeBorrowsToSubmit = useMemo(() => {
                return newBorrows.filter(b => parseFloat(b.amount) > 0 && b.desc.trim() !== '');
            }, [newBorrows]);
            
            const activeFilteredBorrows = useMemo(() => {
                return activeBorrows.filter(b => b.remainingAmount > 0);
            }, [activeBorrows]);

            const hasDraftData = activeCardsData.cards.length > 0 || activeBorrowsToSubmit.length > 0;

            const syncToSheets = async () => {
                if (!scriptUrl.trim()) return alert('Please set your Apps Script URL in settings.');
                if (!hasDraftData) return alert('No data to sync.');
                
                setIsSyncing(true);
                const activeRepsToSync = Object.keys(repayments)
                    .filter(id => repayments[id].active && parseFloat(repayments[id].amount) > 0)
                    .map(id => ({ id, amount: parseFloat(repayments[id].amount) }));

                const payload = { 
                    action: 'syncMonth', 
                    month: selectedMonth, 
                    summary: activeCardsData.summary, 
                    cards: activeCardsData.cards,
                    newBorrows: activeBorrowsToSubmit,
                    repayments: activeRepsToSync
                };

                try {
                    await fetch(scriptUrl.trim(), { 
                        method: 'POST', 
                        body: JSON.stringify(payload),
                        mode: 'no-cors' 
                    });
                    
                    alert(`Successfully synced ${selectedMonth} to Sheets!`);
                    const reset = {};
                    sortedCardList.forEach(c => reset[c] = { total: '', overrides: [] });
                    setFormData(reset);
                    setOfflineSpends(initOfflineSpends());
                    setNewBorrows([]);
                    setRepayments({});
                    setTimeout(fetchAllData, 1000);
                } catch (error) {
                    alert('Error syncing to Sheet. Check network connection.');
                } finally {
                    setIsSyncing(false);
                }
            };

            const consolidateCards = (cardsArray) => {
                const map = {};
                cardsArray.forEach(c => {
                    if (!c || !c[0] || !c[1]) return;
                    const key = c[1]; 
                    if(!map[key]) map[key] = { month: toYYYYMM(c[0]), name: c[1], total: 0, u1: 0, u2: 0, overrides: [] };
                    map[key].total += parseFloat(c[2]) || 0;
                    map[key].u1 += parseFloat(c[3]) || 0;
                    map[key].u2 += parseFloat(c[4]) || 0;
                    if (c[5] && String(c[5]) !== 'None') {
                        map[key].overrides.push(...String(c[5]).split(' | '));
                    }
                });
                return Object.values(map).map(c => [
                    c.month,
                    c.name,
                    c.total,
                    c.u1,
                    c.u2,
                    c.overrides.length > 0 ? c.overrides.join(' | ') : 'None'
                ]);
            };

            const { chartData, pieData, lastMonthData } = useMemo(() => {
                if (!fetchedSummary || fetchedSummary.length === 0) return { chartData: [], pieData: [], lastMonthData: null };

                const aggSum = {};
                fetchedSummary.forEach(row => {
                    if (!row || !row[0]) return;
                    const m = toYYYYMM(row[0]);
                    if (!aggSum[m]) aggSum[m] = { month: m, total: 0, u1: 0, u2: 0 };
                    aggSum[m].total += parseFloat(row[1]) || 0;
                    aggSum[m].u1 += parseFloat(row[2]) || 0;
                    aggSum[m].u2 += parseFloat(row[3]) || 0;
                });
                
                let sortedAggSum = Object.values(aggSum).sort((a, b) => a.month.localeCompare(b.month));
                if (sortedAggSum.length === 0) return { chartData: [], pieData: [], lastMonthData: null };

                let filteredSummary = sortedAggSum;
                const currentYear = new Date().getFullYear();

                if (timeframe === 'Rolling 12') {
                    filteredSummary = sortedAggSum.slice(-12);
                } else if (timeframe === 'CY') {
                    filteredSummary = sortedAggSum.filter(r => r.month.startsWith(currentYear.toString()));
                } else if (timeframe === 'FY') {
                    const currentMonth = new Date().getMonth() + 1;
                    const startYear = currentMonth >= 4 ? currentYear : currentYear - 1;
                    const fyStart = `${startYear}-04`;
                    const fyEnd = `${startYear + 1}-03`;
                    filteredSummary = sortedAggSum.filter(r => r.month >= fyStart && r.month <= fyEnd);
                }

                let totalU1AllTime = 0;
                let totalU2AllTime = 0;

                const cData = filteredSummary.map(row => {
                    const month = row.month;
                    const totalSpend = row.total;
                    const u1Total = row.u1;
                    const u2Total = row.u2;

                    totalU1AllTime += u1Total;
                    totalU2AllTime += u2Total;

                    let monthCards = fetchedCards.filter(c => c && c[0] && toYYYYMM(c[0]) === month);
                    monthCards = consolidateCards(monthCards);
                    
                    let oneOffAmount = 0;
                    let hhTotal = 0;
                    let dedU1 = 0;
                    let dedU2 = 0;
                    let adhocU1List = [];
                    let adhocU2List = [];

                    monthCards.forEach(c => {
                        const cardName = c[1];
                        const cardTotal = parseFloat(c[2]) || 0;

                        if (cardName === 'Offline & Fixed Spends') {
                            hhTotal += cardTotal;
                        } else if (cardName === 'HDFC Swiggy') {
                            hhTotal += cardTotal;
                        } else if (cardName !== 'Settle Borrow') {
                            const deds = parseDeductionsLog(c[5]);
                            deds.forEach(d => {
                                if (d && d.desc && d.owner) {
                                    const isHousehold = DEFAULT_OFFLINE_SPENDS.some(def => d.desc.toLowerCase().includes(def.toLowerCase()));
                                    if (isHousehold) {
                                        hhTotal += d.amount;
                                    } else {
                                        oneOffAmount += d.amount;
                                        if (d.owner.includes(user1Name)) {
                                            dedU1 += d.amount;
                                            adhocU1List.push({ desc: d.desc, amount: d.amount, card: cardName });
                                        }
                                        if (d.owner.includes(user2Name)) {
                                            dedU2 += d.amount;
                                            adhocU2List.push({ desc: d.desc, amount: d.amount, card: cardName });
                                        }
                                    }
                                }
                            });
                        }
                    });

                    return {
                        name: formatMonthName(month),
                        Total: totalSpend,
                        Household: hhTotal,
                        'Ad-hoc': oneOffAmount,
                        'Credit Card': Math.max(0, (totalSpend - oneOffAmount) - hhTotal),
                        [user1Name]: dedU1,
                        [user2Name]: dedU2,
                        rawMonthCards: monthCards,
                        adhocU1List,
                        adhocU2List
                    };
                });

                const pData = [{ name: user1Name, value: totalU1AllTime }, { name: user2Name, value: totalU2AllTime }];
                
                const lastAggSum = sortedAggSum[sortedAggSum.length - 1];
                let cardsForLastMonth = fetchedCards.filter(c => c && c[0] && toYYYYMM(c[0]) === lastAggSum.month);
                cardsForLastMonth = consolidateCards(cardsForLastMonth);

                const lmData = { 
                    month: formatMonthName(lastAggSum.month), 
                    total: lastAggSum.total, 
                    u1Total: lastAggSum.u1, 
                    u2Total: lastAggSum.u2, 
                    cards: cardsForLastMonth 
                };

                return { chartData: cData, pieData: pData, lastMonthData: lmData };
            }, [fetchedSummary, fetchedCards, user1Name, user2Name, timeframe]);

            const uniqueMonths = useMemo(() => {
                return [...new Set(fetchedSummary.filter(s => s && s[0]).map(s => toYYYYMM(s[0])))].sort().reverse();
            }, [fetchedSummary]);

            const historyMonthData = useMemo(() => {
                if (!historyMonth || !fetchedSummary || fetchedSummary.length === 0) return null;
                
                let total = 0, u1Total = 0, u2Total = 0;
                const monthRows = fetchedSummary.filter(r => r && r[0] && toYYYYMM(r[0]) === historyMonth);
                if (monthRows.length === 0) return null;

                monthRows.forEach(r => {
                    total += parseFloat(r[1]) || 0;
                    u1Total += parseFloat(r[2]) || 0;
                    u2Total += parseFloat(r[3]) || 0;
                });
                
                let cardsForMonth = fetchedCards.filter(c => c && c[0] && toYYYYMM(c[0]) === historyMonth);
                cardsForMonth = consolidateCards(cardsForMonth);
                
                if (searchQuery.trim()) {
                    const lowerQ = searchQuery.toLowerCase();
                    cardsForMonth = cardsForMonth.filter(c => {
                        const nameMatch = (c[1] || '').toLowerCase().includes(lowerQ);
                        const descMatch = (c[5] && String(c[5]).toLowerCase().includes(lowerQ));
                        return nameMatch || descMatch;
                    });
                }

                return { month: formatMonthName(historyMonth), total, u1Total, u2Total, cards: cardsForMonth };
            }, [historyMonth, fetchedSummary, fetchedCards, searchQuery]);

            const handleChartClick = (type, data = null) => {
                let title = "";
                let content = null;

                if (type === 'trend' || type === 'bar') {
                    const monthData = data?.activePayload?.[0]?.payload || chartData[chartData.length - 1];
                    if (!monthData) return;
                    
                    if (type === 'trend') {
                        title = `${monthData.name} - Variance Analysis`;
                        const currentIndex = chartData.findIndex(d => d.name === monthData.name);
                        const prev = currentIndex > 0 ? chartData[currentIndex - 1] : null;

                        const renderRow = (label, currVal, prevVal) => {
                            let diffSpan = null;
                            if (prevVal !== null && prevVal !== undefined && prevVal > 0) {
                                const diff = currVal - prevVal;
                                const pct = (diff / prevVal) * 100;
                                const color = diff > 0 ? 'text-red-500' : 'text-green-500';
                                const icon = diff > 0 ? 'fa-arrow-up' : 'fa-arrow-down';
                                diffSpan = <span className={`text-[10px] ml-2 font-bold ${color}`}><i className={`fa-solid ${icon} text-[8px]`}></i> {Math.abs(pct).toFixed(1)}%</span>;
                            }
                            return (
                                <div className="flex justify-between text-gray-600 dark:text-gray-400 border-b border-gray-100 dark:border-[#333] pb-1.5 mb-1.5 last:border-0">
                                    <span><span className="text-gray-300 dark:text-gray-600 mr-1">↳</span> {label}</span> 
                                    <div className="text-right">
                                        <span className="font-medium text-gray-800 dark:text-gray-200">{formatMoney(currVal)}</span>
                                        {diffSpan}
                                    </div>
                                </div>
                            );
                        };

                        content = (
                            <div className="space-y-2 text-sm">
                                <p className="text-[10px] text-gray-500 mb-3 leading-tight border-b border-gray-100 pb-2">Month-over-Month (MoM) variance compared to the previous tracking period.</p>
                                <div className="flex justify-between border-b border-gray-200 dark:border-[#444] pb-2 mb-2">
                                    <span className="font-bold text-gray-800 dark:text-gray-200">Gross Total:</span> 
                                    <div className="text-right">
                                        <span className="font-bold text-gray-800 dark:text-gray-200">{formatMoney(monthData.Total)}</span>
                                        {prev && prev.Total > 0 && (() => {
                                            const diff = monthData.Total - prev.Total;
                                            const pct = (diff / prev.Total) * 100;
                                            const color = diff > 0 ? 'text-red-500' : 'text-green-500';
                                            const icon = diff > 0 ? 'fa-arrow-up' : 'fa-arrow-down';
                                            return <span className={`text-[10px] ml-2 font-bold ${color}`}><i className={`fa-solid ${icon} text-[8px]`}></i> {Math.abs(pct).toFixed(1)}%</span>;
                                        })()}
                                    </div>
                                </div>
                                {renderRow('Credit Card', monthData['Credit Card'], prev?.['Credit Card'])}
                                {renderRow('Household', monthData.Household, prev?.Household)}
                                {renderRow('Ad-hoc', monthData['Ad-hoc'], prev?.['Ad-hoc'])}
                            </div>
                        );
                    } else if (type === 'bar') {
                        title = `${monthData.name} - Ad-hoc Breakdown`;
                        const list1 = monthData.adhocU1List || [];
                        const list2 = monthData.adhocU2List || [];
                        
                        list1.sort((a,b) => b.amount - a.amount);
                        list2.sort((a,b) => b.amount - a.amount);
                        
                        content = (
                            <div className="space-y-4 text-sm">
                                <div>
                                    <div className="flex justify-between border-b border-gray-100 dark:border-[#333333] pb-1 mb-2">
                                        <span className="text-gray-500 font-bold">{user1Name}'s Spikes:</span> 
                                        <span className="font-bold text-blue-500">{formatMoney(monthData[user1Name])}</span>
                                    </div>
                                    {list1.slice(0, 3).map((item, i) => (
                                        <div key={i} className="flex justify-between text-xs text-gray-600 dark:text-gray-400 mb-1 pl-1">
                                            <span className="truncate pr-2"><i className="fa-solid fa-tag text-blue-400 text-[10px] mr-1"></i> {item.desc}</span>
                                            <span>{formatMoney(item.amount)}</span>
                                        </div>
                                    ))}
                                    {list1.length === 0 && <div className="text-xs text-gray-400 pl-1">No ad-hoc spikes logged.</div>}
                                </div>
                                <div>
                                    <div className="flex justify-between border-b border-gray-100 dark:border-[#333333] pb-1 mb-2">
                                        <span className="text-gray-500 font-bold">{user2Name}'s Spikes:</span> 
                                        <span className="font-bold text-purple-500">{formatMoney(monthData[user2Name])}</span>
                                    </div>
                                    {list2.slice(0, 3).map((item, i) => (
                                        <div key={i} className="flex justify-between text-xs text-gray-600 dark:text-gray-400 mb-1 pl-1">
                                            <span className="truncate pr-2"><i className="fa-solid fa-tag text-purple-400 text-[10px] mr-1"></i> {item.desc}</span>
                                            <span>{formatMoney(item.amount)}</span>
                                        </div>
                                    ))}
                                    {list2.length === 0 && <div className="text-xs text-gray-400 pl-1">No ad-hoc spikes logged.</div>}
                                </div>
                            </div>
                        );
                    }
                } else if (type === 'pie') {
                    title = `Aggregate Share Summary`;
                    const totalTracked = pieData.reduce((acc, curr) => acc + curr.value, 0);
                    
                    content = (
                        <div className="space-y-4 text-sm">
                            {pieData.map((d, i) => {
                                const percent = totalTracked > 0 ? ((d.value / totalTracked) * 100).toFixed(1) : 0;
                                return (
                                    <div key={i} className="space-y-2 border-b border-gray-100 dark:border-[#333333] pb-3 last:border-0">

                                            <span className="text-gray-500 text-xs uppercase font-bold tracking-wider">{d.name}'s Split</span>

                                        <div className="flex justify-between px-1">
                                            <span className="text-gray-500">Cumulative Value:</span> 
                                            <span className="font-bold">{formatMoney(d.value)}</span>
                                        </div>
                                    </div>
                                );
                            })}
                            <div className="mt-2 text-[11px] text-gray-500 dark:text-gray-400 leading-relaxed bg-gray-50 dark:bg-[#111111] p-3 rounded-[16px]">
                                This represents the total cumulative financial responsibility across all recorded months, combining standard splits and individual ad-hoc overrides.
                            </div>
                        </div>
                    );
                }
                setPopupData({ title, content });
            };

            const generateShareText = (type, customData = null) => {
                const e = {
                    chart: '\uD83D\uDCCA', cal: '\uD83D\uDCC5', money: '\uD83D\uDCB0', down: '\uD83D\uDCC9',

                    dot: '\uD83D\uDD39', pin: '\uD83D\uDCCC', home: '\uD83C\uDFE0', sync: '\uD83D\uDD04', 
                    smalldot: '\u25AB\uFE0F', line: '━━━━━━━━━━━━━━━━━━━━━'
                };

                const buildInsightsText = () => {
                    if (chartData.length === 0) return `${e.chart} *BILLSPLIT INSIGHTS*\nNo data available.\n\n`;
                    const totalTracked = pieData.reduce((acc, curr) => acc + curr.value, 0);
                    const avgSpend = totalTracked / chartData.length;
                    
                    let insights = `${e.chart} *BILLSPLIT INSIGHTS*\n`;
                    insights += `⏳ _${timeframe.toUpperCase()}_\n`;
                    insights += `${e.line}\n\n`;
                    insights += `${e.cal} *Months Tracked:* ${chartData.length}\n\n`;
                    insights += `${e.money} *Total Spends:* ${formatMoney(totalTracked)}\n`;
                    insights += `${e.down} *Monthly Average:* ${formatMoney(avgSpend)}\n\n`;
                    insights += `${e.u1} *${user1Name}'s Share:* ${formatMoney(pieData[0].value)}\n`;
                    insights += `${e.u2} *${user2Name}'s Share:* ${formatMoney(pieData[1].value)}\n\n`;
                    insights += `${e.line}\n`;
                    insights += `${e.sparkle} _Generated via BillSplit_`;
                    return insights;
                };

                const buildMonthText = (dataObj, label = "LAST MONTH") => {
                    if (!dataObj) return `${e.chart} *${label} SUMMARY*\nNo data available.\n\n`;
                    let mText = `${e.chart} *${label.toUpperCase()} SUMMARY*\n`;
                    mText += `${e.cal} *MONTH:* ${dataObj.month.toUpperCase()}\n`;
                    mText += `${e.line}\n\n`;
                    mText += `${e.money} *Total Spends:* ${formatMoney(dataObj.total)}\n\n`;
                    mText += `${e.u1} *${user1Name}'s Share:* ${formatMoney(dataObj.u1Total)}\n`;
                    mText += `${e.u2} *${user2Name}'s Share:* ${formatMoney(dataObj.u2Total)}\n\n`;

                    if (dataObj.cards.length > 0) {
                        const ccData = dataObj.cards.filter(c => c[1] !== 'Offline & Fixed Spends' && c[1] !== 'Settle Borrow');
                        const offlineData = dataObj.cards.find(c => c[1] === 'Offline & Fixed Spends');
                        const loanData = dataObj.cards.find(c => c[1] === 'Settle Borrow');

                        if (ccData.length > 0) {
                            mText += `${e.line}\n`;
                            mText += `${e.card} *CREDIT CARDS*\n\n`;
                            ccData.forEach(c => {
                                mText += `${e.dot} *${c[1]}* \n     ${formatMoney(c[2])}\n`;
                                mText += `     ↳ ${user1Name}: ${formatMoney(c[3])} | ${user2Name}: ${formatMoney(c[4])}\n`;
                                if (c[5] && c[5] !== 'None') {
                                    String(c[5]).split(' | ').forEach(ov => { mText += `     ${e.pin} _${formatOverrideString(ov)}_\n`; });
                                }
                                mText += `\n`;
                            });
                        }

                        if (offlineData && offlineData[5] !== 'None') {
                            mText += `${e.line}\n`;
                            mText += `${e.home} *FIXED & OFFLINE SPENDS*\n\n`;
                            mText += `${e.dot} *Total Expenses* \n     ${formatMoney(offlineData[2])}\n`;
                            mText += `     ↳ ${user1Name}: ${formatMoney(offlineData[3])} | ${user2Name}: ${formatMoney(offlineData[4])}\n`;
                            String(offlineData[5]).split(' | ').forEach(ov => { mText += `     ${e.smalldot} _${formatOverrideString(ov)}_\n`; });
                            mText += `\n`;
                        }

                        if (loanData && loanData[5] !== 'None') {
                            mText += `${e.line}\n`;
                            mText += `${e.sync} *BORROW REPAYMENTS*\n\n`;
                            String(loanData[5]).split(' | ').forEach(ov => { mText += `     ${e.smalldot} _${formatOverrideString(ov)}_\n`; });
                            mText += `\n`;
                        }
                    }
                    mText += `${e.line}\n`;
                    mText += `${e.sparkle} _Generated via BillSplit_`;
                    return mText;
                };

                if (type === 'insights') return buildInsightsText();
                if (type === 'lastMonth') return buildMonthText(lastMonthData, "LAST MONTH");
                if (type === 'both') return buildInsightsText() + `\n\n` + buildMonthText(lastMonthData, "LAST MONTH");
                if (type === 'history') return buildMonthText(customData, "MONTHLY");
                return '';
            };

            const handleShare = (type, customData = null) => {
                const text = generateShareText(type, customData);
                window.open(`https://wa.me/?text=${encodeURIComponent(text.trim())}`);
                setShareModalOpen(false);
            };

            const handleCopy = (type, customData = null) => {
                const text = generateShareText(type, customData);
                navigator.clipboard.writeText(text).then(() => {
                    alert("Text copied to clipboard!");
                    setShareModalOpen(false);
                });
            };

            const toggleChart = (e, id) => {
                e.stopPropagation();
                setMinimizedCharts(prev => ({...prev, [id]: !prev[id]}));
            };

            const shareBorrowLedger = (borrow) => {
                let text = `📒 *BORROW LEDGER*\n`;
                text += `━━━━━━━━━━━━━━━━━━━━━\n\n`;
                text += `📌 *${borrow.desc}*\n`;
                text += `👤 *Borrower:* ${borrow.borrower}\n`;
                text += `📅 *Originated:* ${formatMonthName(borrow.month)}\n\n`;
                text += `💰 *Principal:* ${formatMoney(borrow.totalAmount)}\n`;
                text += `📉 *Remaining:* ${formatMoney(borrow.remainingAmount)}\n\n`;
                
                if (borrow.history && borrow.history.length > 0) {
                    text += `*Repayment History:*\n`;

                }
                text += `\n✨ _Generated via BillSplit_`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
            };

            const COLORS = ['#3b82f6', '#a855f7'];

            const renderUserBreakdown = (userName, cardsData) => {
                if (!cardsData || cardsData.length === 0) return null;
                
                let ccSpends = [];
                let hhSpends = [];
                let specificDeds = [];

                let ccTotal = 0;
                let hhTotal = 0;
                let dedTotal = 0;

                const isUser1 = userName === user1Name;
                
                cardsData.forEach(c => {
                    if (!c) return;
                    const isArray = Array.isArray(c);
                    const cName = (isArray ? c[1] : c.cardName) || 'Unknown';
                    const uShare = isArray ? (parseFloat(c[isUser1 ? 3 : 4]) || 0) : (parseFloat(isUser1 ? c.u1Share : c.u2Share) || 0);
                    
                    let overrides = [];
                    if (isArray) {
                        overrides = parseDeductionsLog(c[5]);
                    } else {
                        overrides = c.overrides || [];
                    }

                    if (cName === 'Offline & Fixed Spends') {
                        overrides.forEach(ov => {
                            if (!ov || !ov.owner) return;
                            let itemShare = 0;
                            if (ov.owner === userName) itemShare = parseFloat(ov.amount) || 0;
                            else if (ov.owner === 'Split') itemShare = (parseFloat(ov.amount) || 0) / 2;
                            
                            if (itemShare > 0) {
                                hhSpends.push({ desc: ov.desc || 'Item', amount: itemShare });
                                hhTotal += itemShare;
                            }
                        });
                    } else if (cName === 'Settle Borrow') {
                        // Exclude from general breakdown list
                    } else {
                        let cardBaseShare = uShare;
                        overrides.forEach(ov => {
                            if (!ov || !ov.owner) return;
                            if (ov.owner === userName || ov.owner === 'Split') {
                                const dedAmt = ov.owner === userName ? (parseFloat(ov.amount) || 0) : (parseFloat(ov.amount) || 0) / 2;
                                const ovDesc = ov.desc || '';
                                
                                const isHousehold = DEFAULT_OFFLINE_SPENDS.some(def => ovDesc.toLowerCase().includes(def.toLowerCase()));
                                
                                if (isHousehold) {

                                    hhTotal += dedAmt;
                                    cardBaseShare -= dedAmt;
                                } else {
                                    specificDeds.push({ desc: `${ovDesc} (${cName})`, amount: dedAmt });
                                    dedTotal += dedAmt;
                                    cardBaseShare -= dedAmt;

                        if (cardBaseShare > 0) {
                            ccSpends.push({ desc: cName, amount: cardBaseShare });

                    }
                });

                return (
                    <div className="mt-4 mb-2 p-5 bg-white rounded-[24px] shadow-sm border border-gray-100 spring-up">

                            <button onClick={() => setExpandedUser(null)} className="text-gray-400 hover:text-red-500 transition-all active:scale-[0.97] w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 hover:bg-red-50"><i className="fa-solid fa-times text-sm"></i></button>

                                        <span>{formatMoney(hhTotal)}</span>

                                        {hhSpends.map((item, i) => (

                            {ccSpends.length > 0 && (

                                            <div key={i} className="flex justify-between text-gray-600 text-xs pl-1">
                                                <span className="truncate pr-2"><i className="fa-regular fa-credit-card text-[9px] text-blue-300 mr-2"></i>{item.desc}</span>
                                                <span className="font-bold text-gray-700">{formatMoney(item.amount)}</span>
                                            </div>
                                        ))}
                                    </div>

                                <div>
                                    <div className="flex justify-between font-bold text-purple-700 mb-2 text-[11px] uppercase tracking-widest border-b border-purple-50 pb-1.5">

                                                <span className="font-bold text-gray-700">{formatMoney(item.amount)}</span>

                                    </div>

            const renderChart = (id, index) => {
                const isMin = minimizedCharts[id];

                if (id === 'pie') { title = `${timeframe} Aggregate Split`; subtitle = "Overall cumulative share breakdown."; }

                        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/60 backdrop-blur-md p-5 transition-opacity" onClick={() => setPopupData(null)}>
                            <div className="bg-white dark:bg-[#111111] border border-gray-100 dark:border-[#333333] rounded-[36px] shadow-2xl w-full max-w-sm overflow-hidden relative spring-up" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center p-6 border-b border-gray-50 dark:border-[#222]">
                                    <h3 className="font-black text-gray-800 dark:text-gray-100 text-lg tracking-tight"><i className="fa-solid fa-circle-info text-teal-500 mr-3"></i>{popupData.title}</h3>
                                    <button onClick={() => setPopupData(null)} className="text-gray-400 hover:text-red-500 bg-gray-50 dark:bg-[#1a1a1a] w-10 h-10 flex items-center justify-center rounded-full transition-all active:scale-90"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="p-7 text-gray-700 dark:text-gray-300">
                                    {popupData.content}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Floating Pill Nav */}
                    <nav className={`fixed left-1/2 -translate-x-1/2 w-[92%] max-w-[380px] bg-white/80 dark:bg-[#111111]/80 backdrop-blur-2xl border border-white/40 dark:border-[#333]/50 rounded-full p-2 flex justify-between items-center z-40 shadow-[0_15px_35px_-5px_rgba(0,0,0,0.15),0_0_0_1px_rgba(0,0,0,0.02)] transition-all duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] ${isNavVisible ? 'bottom-6 translate-y-0 opacity-100' : 'bottom-0 translate-y-24 opacity-0 pointer-events-none'}`}>
                        
                        <button onClick={() => setHistoryHubOpen(true)} className="flex-1 py-3 flex flex-col items-center justify-center text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 transition-colors active:scale-95">
                            <i className="fa-solid fa-layer-group text-xl mb-1.5"></i>
                            <span className="text-[9px] font-black tracking-widest uppercase">Hub</span>
                        </button>
                        
                        <div className="flex-none px-2 relative -top-6">
                            <button onClick={() => setView('dashboard')} className={`w-16 h-16 rounded-[24px] flex items-center justify-center text-2xl shadow-[0_10px_25px_rgba(15,118,110,0.3)] transition-all duration-300 active:scale-95 ${view === 'dashboard' ? 'bg-teal-700 text-white scale-110' : 'bg-white dark:bg-[#222] text-gray-400 border-[4px] border-gray-50 dark:border-[#111]'}`}>
                                <i className="fa-solid fa-chart-pie"></i>
                            </button>
                        </div>
                        
                        <button onClick={() => setView('entry')} className={`flex-1 py-3 flex flex-col items-center justify-center transition-colors active:scale-95 ${view === 'entry' ? 'text-teal-700 dark:text-teal-400' : 'text-gray-400 hover:text-gray-800 dark:hover:text-gray-200'}`}>
                            <i className="fa-solid fa-pen-to-square text-xl mb-1.5"></i>
                            <span className="text-[9px] font-black tracking-widest uppercase">Entry</span>
                        </button>

                    </nav>
                </div>
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-6 bg-[#f9fafb] text-gray-800 min-h-screen flex items-center justify-center">
                            <div className="bg-white p-8 rounded-[36px] shadow-2xl border border-red-100 w-full max-w-sm text-center">
                                <div className="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i className="fa-solid fa-triangle-exclamation text-4xl text-red-500"></i>
                                </div>
                                <h1 className="text-2xl font-black mb-2 tracking-tight">System Crash</h1>
                                <p className="text-sm font-medium text-gray-500 mb-6">An unexpected error occurred in the component tree.</p>
                                
                                <div className="text-[10px] bg-gray-50 p-4 rounded-2xl border border-gray-100 break-words font-mono text-left text-gray-600 shadow-inner max-h-32 overflow-y-auto mb-8">
                                    {this.state.error?.toString()}
                                </div>
                                
                                <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="w-full bg-gray-900 text-white p-4 rounded-[24px] font-black text-lg hover:bg-black active:scale-[0.95] transition-all">
                                    Factory Reset
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
